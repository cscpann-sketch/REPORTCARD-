<style>
  :root{
    --paper:#F6F3EC; --paper-2:#FCFAF4; --ink:#21281F;
    --chalk:#2F5D50; --chalk-light:#3E7566;
    --marigold:#D98F2B; --redpen:#B23A32; --line:#D8D2C2; --muted:#6B6456;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans Devanagari','Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Noto Serif Devanagari',serif;letter-spacing:.2px;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  header.top{background:var(--chalk);color:var(--paper-2);padding:22px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header.top h1{margin:0;font-size:1.5rem;font-weight:700;}
  header.top .tagline{font-size:.82rem;opacity:.8;margin-top:2px;}
  header.top .who{font-size:.85rem;text-align:right;}
  header.top button.logout{background:transparent;border:1px solid rgba(255,255,255,.5);color:var(--paper-2);padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.8rem;margin-left:10px;}
  header.top button.logout:hover{background:rgba(255,255,255,.12);}
  nav.tabs{display:flex;gap:2px;background:var(--chalk-light);padding:0 24px;overflow-x:auto;}
  nav.tabs button{background:transparent;border:none;color:rgba(255,255,255,.75);padding:12px 16px;cursor:pointer;font-family:'Noto Sans Devanagari',sans-serif;font-size:.87rem;font-weight:600;border-bottom:3px solid transparent;white-space:nowrap;}
  nav.tabs button.active{color:#fff;border-bottom-color:var(--marigold);}
  nav.tabs button:hover{color:#fff;}
  main{max-width:1040px;margin:26px auto 60px;padding:0 16px;}
  .page{background:var(--paper-2);border:1px solid var(--line);border-radius:6px;position:relative;padding:28px 28px 28px 56px;box-shadow:0 1px 3px rgba(0,0,0,.04);}

  p.section-sub{margin:0 0 20px;color:var(--muted);font-size:.85rem;}

  .field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;}
  .field label{font-size:.75rem;color:var(--muted);font-weight:600;}
  input,select{font-family:inherit;font-size:.9rem;padding:8px 10px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink);}
  input:focus,select:focus{outline:2px solid var(--chalk-light);outline-offset:1px;}
  input.mark-invalid{border-color:var(--redpen);background:#FBEAE8;outline:2px solid var(--redpen);outline-offset:1px;}
  button.primary{background:var(--chalk);color:#fff;border:none;padding:9px 18px;border-radius:4px;font-family:inherit;font-weight:600;cursor:pointer;font-size:.88rem;}
  button.primary:hover{background:var(--chalk-light);}
  button.ghost{background:transparent;border:1px solid var(--chalk);color:var(--chalk);padding:8px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;}
  button.ghost:hover{background:rgba(47,93,80,.08);}
  button.danger{background:transparent;border:1px solid var(--redpen);color:var(--redpen);padding:6px 10px;border-radius:4px;cursor:pointer;font-size:.78rem;}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.87rem;}
  th,td{padding:7px 9px;border-bottom:1px solid var(--line);text-align:left;}
  th{color:var(--muted);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;}
  td.num, th.num{text-align:center;}
  tr:hover td{background:rgba(47,93,80,.04);}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:10px;}
  .assign-card{border:1px solid var(--line);border-radius:6px;padding:16px;background:#fff;cursor:pointer;transition:box-shadow .15s, transform .15s;}
  .assign-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.08);transform:translateY(-1px);}

  .assign-card .sub{color:var(--marigold);font-weight:700;font-size:.85rem;margin-top:2px;}
  .assign-card .meta{color:var(--muted);font-size:.75rem;margin-top:8px;}

  .grade-C{color:var(--redpen);font-weight:700;} .grade-D{color:var(--redpen);font-weight:700;}
  .report-card{border:1px solid var(--line);border-radius:6px;padding:20px;background:#fff;margin-bottom:22px;page-break-inside:avoid;}
  .report-card .rc-header{text-align:center;border-bottom:3px solid var(--chalk);padding-bottom:10px;margin-bottom:14px;}
  .report-card .rc-header .rc-logo{max-height:56px;max-width:120px;object-fit:contain;margin-bottom:4px;}
  .report-card .rc-header .rc-school-name{font-family:'Noto Serif Devanagari',serif;font-size:1.5rem;font-weight:700;color:var(--chalk);letter-spacing:.5px;line-height:1.2;}
  .report-card .rc-header .rc-school-addr{font-family:'Noto Sans Devanagari',sans-serif;font-size:.8rem;color:var(--muted);margin-top:3px;}
  .report-card .rc-header .rc-title{margin-top:8px;font-family:'Noto Serif Devanagari',serif;font-size:1.05rem;font-weight:700;color:#fff;background:var(--marigold);display:inline-block;padding:4px 18px;border-radius:3px;letter-spacing:.5px;}
  .report-card h3{margin:0 0 2px;color:var(--chalk);}
  .report-card .roll{color:var(--muted);font-size:.82rem;margin-bottom:12px;}
  .report-card .summary{display:flex;gap:22px;margin-top:10px;font-size:.9rem;flex-wrap:wrap;}
  .report-card .summary div b{display:block;font-family:'IBM Plex Mono',monospace;font-size:1.1rem;}
  .exam-block{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;}

  .annual-block{margin-top:18px;border-top:2px solid var(--chalk);padding-top:14px;}
  .annual-block h4{margin:0 0 6px;color:var(--chalk);font-size:1rem;font-family:'Noto Serif Devanagari',serif;}
  .exam-tabbar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .exam-tabbar button{background:#fff;border:1px solid var(--line);color:var(--muted);padding:7px 14px;border-radius:16px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;}
  .exam-tabbar button.active{background:var(--chalk);border-color:var(--chalk);color:#fff;}
  .type-tag{display:inline-block;font-size:.68rem;padding:1px 7px;border-radius:8px;background:rgba(47,93,80,.12);color:var(--chalk);margin-left:6px;}

  /* ---- Admit Card ---- */
  #admitPrintWrap{padding:0 0 30px;}
  .admit-card{
    width:210mm;min-height:297mm;margin:0 auto 26px;background:#fff;
    border:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.08);
    padding:12mm 14mm;box-sizing:border-box;display:flex;flex-direction:column;
    position:relative;overflow:hidden;
  }
  .admit-card .ac-watermark{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .admit-card .ac-watermark svg{width:100%;height:100%;display:block;}
  .admit-card .ac-header,.admit-card .ac-main,.admit-card .ac-sched,.admit-card .ac-instructions,.admit-card .ac-signatures{position:relative;z-index:1;}
  .admit-card .ac-header{text-align:center;border-bottom:3px solid var(--chalk);padding-bottom:10px;margin-bottom:16px;}
  .admit-card .ac-header .ac-school-name{font-family:'Noto Serif Devanagari',serif;font-size:1.7rem;font-weight:700;color:var(--chalk);letter-spacing:.5px;line-height:1.2;width:100%;}
  .admit-card .ac-header .ac-school-addr{font-family:'Noto Sans Devanagari',sans-serif;font-size:.82rem;color:var(--muted);margin-top:4px;}
  .admit-card .ac-header .ac-admit-title{margin-top:10px;font-family:'Noto Serif Devanagari',serif;font-size:1.15rem;font-weight:700;color:#fff;background:var(--marigold);display:inline-block;padding:5px 22px;border-radius:3px;letter-spacing:.5px;}
  .admit-card .ac-header .ac-exam-sub{display:block;margin-top:6px;font-size:.85rem;color:var(--chalk);font-weight:600;}
  .admit-card .ac-main{display:flex;gap:22px;margin-bottom:20px;}
  .admit-card .ac-photo{width:104px;height:126px;border:1px dashed var(--muted);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.72rem;text-align:center;flex-shrink:0;border-radius:4px;overflow:hidden;background:#fff;}
  .admit-card .ac-photo img{width:100%;height:100%;object-fit:cover;}
  .admit-card .ac-details{flex:1;}
  .admit-card .ac-details table{width:100%;border-collapse:collapse;}
  .admit-card .ac-details td{padding:6px 8px;font-size:.92rem;border-bottom:1px solid var(--line);}
  .admit-card .ac-details td.k{color:var(--muted);width:36%;font-weight:600;}
  .admit-card .ac-sched h4{margin:0 0 8px;color:var(--chalk);font-size:1rem;font-family:'Noto Serif Devanagari',serif;border-bottom:1px solid var(--line);padding-bottom:6px;}
  .admit-card .ac-sched table{width:100%;border-collapse:collapse;font-size:.87rem;}
  .admit-card .ac-sched th,.admit-card .ac-sched td{border:1px solid var(--line);padding:7px 9px;text-align:left;}
  .admit-card .ac-sched th{background:rgba(47,93,80,.08);color:var(--chalk);font-size:.72rem;text-transform:uppercase;letter-spacing:.03em;}
  .admit-card .ac-instructions{margin-top:16px;font-size:.78rem;color:#7A5A15;background:#FBF3E4;border:1px solid #EBD9AF;padding:10px 14px;border-radius:5px;}
  .admit-card .ac-instructions h5{margin:0 0 6px;font-size:.82rem;color:#7A5A15;font-family:'Noto Serif Devanagari',serif;}
  .admit-card .ac-instructions ul{margin:0;padding-left:18px;}
  .admit-card .ac-instructions li{margin-bottom:3px;}
  .admit-card .ac-signatures{margin-top:auto;display:flex;justify-content:space-between;padding-top:34px;}
  .admit-card .ac-sig{text-align:center;font-size:.8rem;color:var(--muted);width:28%;}
  .admit-card .ac-sig .line{border-top:1px solid var(--ink);margin-bottom:5px;padding-top:5px;}
  .admit-card-toolbar{display:flex;gap:10px;padding:14px 4px 20px;flex-wrap:wrap;align-items:center;}
  .wm-settings{background:#F9F7F0;border:1px solid var(--line);border-radius:6px;padding:16px 16px 6px;margin:14px 0 18px;}
  .wm-settings h4{margin:0 0 10px;color:var(--chalk);font-size:1rem;font-family:'Noto Serif Devanagari',serif;}
  .wm-preview-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin:10px 0 16px;}
  .wm-preview{width:150px;height:212px;background:#fff;border:1px solid var(--line);position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .wm-preview svg{width:100%;height:100%;display:block;}
  .wm-preview-label{font-size:.72rem;color:var(--muted);}
  .sched-editor input[type="date"], .sched-editor input[type="time"]{width:100%;}
  .stu-pick-row{display:flex;align-items:center;gap:10px;padding:6px 2px;border-bottom:1px solid var(--line);font-size:.88rem;}
  .stu-pick-row .roll{width:56px;color:var(--muted);}
  .stu-thumb{width:26px;height:32px;object-fit:cover;border-radius:2px;border:1px solid var(--line);vertical-align:middle;}
  textarea{font-family:inherit;font-size:.88rem;padding:8px 10px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink);width:100%;resize:vertical;}

  @page{ size:A4; margin:10mm; }
  @media print{
    header.top, nav.tabs, .no-print{display:none !important;}
    .page{box-shadow:none;border:none;padding:0;}
    .page::before,.page .punch{display:none;}
    main{max-width:100%;}
    .admit-card{box-shadow:none;border:none;margin:0;width:100%;min-height:0;page-break-after:always;}
    .admit-card:last-of-type{page-break-after:auto;}
    #admitPrintWrap{padding:0;}
  }
  @media (max-width:600px){ .page{padding:20px 16px;} .page::before,.page .punch{display:none;} }
</style>

<script>
// ---------- FIREBASE (cloud/live storage) ----------
const firebaseConfig = {
  apiKey: "AIzaSyBCk2jfEGZJceb15r0qQY4LN4F4ZDybLXs",
  authDomain: "school-report-card-32844.firebaseapp.com",
  databaseURL: "https://school-report-card-32844-default-rtdb.firebaseio.com",
  projectId: "school-report-card-32844",
  storageBucket: "school-report-card-32844.firebasestorage.app",
  messagingSenderId: "389312909856",
  appId: "1:389312909856:web:db210900cfc8d8351ea245",
  measurementId: "G-CRQWZGYQF6"
};
firebase.initializeApp(firebaseConfig);
const fbDB = firebase.database();

function encodeFbKey(key){ return encodeURIComponent(key).replace(/\./g, '%2E'); }
function decodeFbKey(key){ return decodeURIComponent(key.replace(/%2E/g, '.')); }

// Drop-in replacement for the old sandboxed window.storage API, now backed by
// Firebase Realtime Database so data is live/cloud-based and shared across all users.
window.storage = {
  async get(key, shared){
    const snap = await fbDB.ref('data/' + encodeFbKey(key)).get();
    if(!snap.exists()) return null;
    return {key, value: snap.val(), shared: !!shared};
  },
  async set(key, value, shared){
    await fbDB.ref('data/' + encodeFbKey(key)).set(value);
    return {key, value, shared: !!shared};
  },
  async delete(key, shared){
    await fbDB.ref('data/' + encodeFbKey(key)).remove();
    return {key, deleted: true, shared: !!shared};
  },
  async list(prefix, shared){
    const snap = await fbDB.ref('data').get();
    if(!snap.exists()) return {keys: [], prefix, shared: !!shared};
    const allKeys = Object.keys(snap.val()).map(decodeFbKey);
    const filtered = prefix ? allKeys.filter(k=>k.startsWith(prefix)) : allKeys;
    return {keys: filtered, prefix, shared: !!shared};
  }
};

const REGISTRY_KEY = 'schools-registry-v1';
const TEACHER_INDEX_KEY = 'teacher-index-v1';
const MAIN_KEY = 'मुख्य';
const SUPERADMIN_USER = 'superadmin';
const SUPERADMIN_PASS = 'superadmin123';
function schoolDbKey(id){ return 'school-db-v2::' + id; }

let db = null;
let session = null;
let registry = [];            // [{id, name, address, loginUsername, loginPassword, createdAt}]
let teacherIndex = {};        // { teacherUsername: schoolId }  -- global lookup so a teacher can log in without picking a school first
let currentSchoolId = null;   // id of the school currently loaded into `db`
let ui = { tab: 'school', teacherTab: null, examTab: null, admitPrintView: null, loginRole: null };
let saState = { tab: 'list', search: '' }; // superadmin dashboard: 'list' (all schools) or 'add' (नया स्कूल जोड़ें)

function emptyDB(){
  return {
    exams: ['तिमाही परीक्षा','अर्धवार्षिक परीक्षा','वार्षिक परीक्षा'],
    teachers:{}, assignments:{}, classes:{}, marks:{},
    examSchedule:{}, school:{name:'हमारा विद्यालय', address:''}, customInstructions:[],
    watermark:{enabled:true, style:'rings', color:'#2F5D50', opacity:0.14, text:'', density:6, thickness:'normal', fontSize:100},
    adminAuth:{username:'admin', password:'admin123'}
  };
}
async function loadRegistry(){
  try{ const res = await window.storage.get(REGISTRY_KEY, true); registry = res ? JSON.parse(res.value) : []; }
  catch(e){ registry = []; }
}
async function saveRegistry(){
  try{ await window.storage.set(REGISTRY_KEY, JSON.stringify(registry), true); }
  catch(e){ console.error('registry save failed', e); }
}
async function loadTeacherIndex(){
  try{ const res = await window.storage.get(TEACHER_INDEX_KEY, true); teacherIndex = res ? JSON.parse(res.value) : {}; }
  catch(e){ teacherIndex = {}; }
}
async function saveTeacherIndex(){
  try{ await window.storage.set(TEACHER_INDEX_KEY, JSON.stringify(teacherIndex), true); }
  catch(e){ console.error('teacher index save failed', e); }
}
// Read-only fetch of another school's raw DB, without touching global db/currentSchoolId (used for login verification)
async function fetchSchoolDB(schoolId){
  try{ const res = await window.storage.get(schoolDbKey(schoolId), true); return res ? JSON.parse(res.value) : null; }
  catch(e){ return null; }
}
async function createSchool(name, address, adminUser, adminPass){
  const id = 's' + Date.now() + Math.random().toString(36).slice(2,7);
  registry.push({id, name, address: address||'', loginUsername: adminUser, loginPassword: adminPass, createdAt: Date.now()});
  await saveRegistry();
  const newDb = emptyDB();
  newDb.school.name = name;
  newDb.school.address = address||'';
  newDb.adminAuth = {username: adminUser, password: adminPass};
  try{ await window.storage.set(schoolDbKey(id), JSON.stringify(newDb), true); }
  catch(e){ console.error('school create failed', e); }
  return id;
}
async function syncRegistryEntryForCurrentSchool(){
  const entry = registry.find(s=>s.id===currentSchoolId);
  if(entry){
    entry.name = db.school.name;
    entry.address = db.school.address;
    entry.loginUsername = db.adminAuth.username;
    entry.loginPassword = db.adminAuth.password;
    await saveRegistry();
  }
}
async function deleteSchool(id){
  registry = registry.filter(s=>s.id!==id);
  await saveRegistry();
  // also drop any teacher-index entries that pointed at this school
  Object.keys(teacherIndex).forEach(u=>{ if(teacherIndex[u]===id) delete teacherIndex[u]; });
  await saveTeacherIndex();
  try{ await window.storage.delete(schoolDbKey(id), true); }catch(e){}
}
async function loadDB(schoolId){
  try{ const res = await window.storage.get(schoolDbKey(schoolId), true); db = res ? JSON.parse(res.value) : emptyDB(); }
  catch(e){ db = emptyDB(); }
  if(!db.exams) db.exams = emptyDB().exams;
  if(!db.examSchedule) db.examSchedule = {};
  if(!db.school) db.school = {name:'हमारा विद्यालय', address:''};
  if(!db.customInstructions) db.customInstructions = [];
  if(!db.watermark) db.watermark = {enabled:true, style:'rings', color:'#2F5D50', opacity:0.14, text:'', density:6, thickness:'normal', fontSize:100};
  if(db.watermark.density==null) db.watermark.density = 3;
  if(!db.watermark.thickness) db.watermark.thickness = 'normal';
  if(db.watermark.fontSize==null) db.watermark.fontSize = 100;
  if(!db.adminAuth) db.adminAuth = {username:'admin', password:'admin123'};
  currentSchoolId = schoolId;
}
async function saveDB(){
  try{ await window.storage.set(schoolDbKey(currentSchoolId), JSON.stringify(db), true); }
  catch(e){ console.error('save failed', e); }
}
async function exportAllData(){
  const schools = {};
  for(const s of registry){
    const d = await fetchSchoolDB(s.id);
    if(d) schools[s.id] = d;
  }
  const payload = {version:1, exportedAt: Date.now(), registry, teacherIndex, schools};
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `school-report-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
async function importAllData(file){
  const text = await file.text();
  let payload;
  try{ payload = JSON.parse(text); }
  catch(e){ throw new Error('यह एक मान्य JSON फ़ाइल नहीं है'); }
  if(!payload || !Array.isArray(payload.registry) || typeof payload.schools !== 'object'){
    throw new Error('यह एक मान्य बैकअप फ़ाइल नहीं है');
  }
  registry = payload.registry;
  teacherIndex = payload.teacherIndex || {};
  await saveRegistry();
  await saveTeacherIndex();
  for(const id of Object.keys(payload.schools)){
    try{ await window.storage.set(schoolDbKey(id), JSON.stringify(payload.schools[id]), true); }
    catch(e){ console.error('school import failed for', id, e); }
  }
}

function grade(pct){
  if(pct>=90) return ['A1','grade-A1'];
  if(pct>=75) return ['A2','grade-A2'];
  if(pct>=60) return ['B1','grade-B1'];
  if(pct>=45) return ['B2','grade-B2'];
  if(pct>=33) return ['C','grade-C'];
  return ['D (अनुत्तीर्ण)','grade-D'];
}
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function readAndCompressImage(file){
  return new Promise((resolve, reject)=>{
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const targetW = 180, targetH = 220;
        const canvas = document.createElement('canvas');
        canvas.width = targetW; canvas.height = targetH;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(targetW/img.width, targetH/img.height);
        const sw = targetW/scale, sh = targetH/scale;
        const sx = (img.width-sw)/2, sy = (img.height-sh)/2;
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = ()=> reject(new Error('image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

function readLogoImage(file){
  return new Promise((resolve, reject)=>{
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 220;
        const scale = Math.min(1, maxDim/Math.max(img.width, img.height));
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = ()=> reject(new Error('image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

      <div id="schCredMsg" style="color:var(--chalk);font-size:.85rem;"></div>
    </div>
  </div>`);

  let pendingLogo = undefined; // undefined = no change, null = remove, dataURL = new
  wrap.querySelector('#schLogo').addEventListener('change', async (e)=>{
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    try{
      pendingLogo = await readLogoImage(file);
      wrap.querySelector('#schLogoPreview').innerHTML = `<img src="${pendingLogo}" style="width:100%;height:100%;object-fit:contain;">`;
    }catch(err){ console.error('logo processing failed', err); }
  });

      wrap.querySelector('#schLogoPreview').innerHTML = '<span style="color:var(--muted);font-size:.7rem;">कोई लोगो नहीं</span>';
      removeBtn.remove();
    };
  }

  wrap.querySelector('#schSave').onclick = async ()=>{
    db.school.name = wrap.querySelector('#schName').value.trim();
    db.school.address = wrap.querySelector('#schAddr').value.trim();
    if(pendingLogo === null) delete db.school.logo;
    else if(pendingLogo) db.school.logo = pendingLogo;
    await saveDB();
    await syncRegistryEntryForCurrentSchool();
    const msg = wrap.querySelector('#schSavedMsg');
    msg.textContent = 'सेव हो गया ✓';
    setTimeout(()=>{ if(msg) msg.textContent=''; }, 2000);
  };

  wrap.querySelector('#schCredSave').onclick = async ()=>{
    const errBox = wrap.querySelector('#schCredErr');
    const msgBox = wrap.querySelector('#schCredMsg');
    errBox.textContent=''; msgBox.textContent='';
    const u = wrap.querySelector('#schLoginUser').value.trim();
    const p = wrap.querySelector('#schLoginPass').value.trim();
    if(!u || !p){ errBox.textContent = 'Username व Password खाली नहीं हो सकते'; return; }
    if(registry.some(s=> s.id!==currentSchoolId && s.loginUsername===u)){
      errBox.textContent = 'यह Login Username किसी और स्कूल में पहले से उपयोग हो रहा है, कृपया दूसरा चुनें'; return;
    }
    db.adminAuth = {username:u, password:p};
    await saveDB();
    await syncRegistryEntryForCurrentSchool();
    msgBox.textContent = 'लॉगिन जानकारी सेव हो गई ✓';
    setTimeout(()=>{ if(msgBox) msgBox.textContent=''; }, 2500);
  };

  return wrap;
}

function renderClasses(){
  const wrap = el(`<div class="page"><div class="punch"></div>
    <div class="row" style="align-items:flex-start;justify-content:space-between;flex-wrap:wrap;">

  wrap.querySelector('#stuExportBtn').onclick = ()=>{
    const rows = [STU_COLS];
    Object.keys(db.classes).forEach(cname=>{
      (db.classes[cname].students||[]).forEach(s=>{
        rows.push([cname, s.roll||'', s.name||'', s.father||s.guardian||'', s.mother||'']);
      });
    });
    const wsData = rows.length>1 ? rows : [STU_COLS];
    const ws = XLSX.utils.aoa_to_sheet(wsData);

      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});

      rows.forEach(r=>{
        const cname = String(r['कक्षा']||'').trim();

        if(!cname || !name){ skipped++; return; }
        if(!db.classes[cname]) db.classes[cname] = {students:[]};
        const roll = String(r['रोल नं.']||'').trim() || String(db.classes[cname].students.length+1);

  if(classNames.length===0) listHost.appendChild(el(`<div class="empty">अभी कोई कक्षा नहीं बनी है</div>`));
  classNames.forEach(cname=>{

      <div class="field"><label>रोल नंबर</label><input class="sroll" data-cls="${cname}" placeholder="रोल नं."></div>
      <div class="field"><label>पिता का नाम (वैकल्पिक)</label><input class="sfather" data-cls="${cname}" placeholder="पिता का नाम"></div>
      <div class="field"><label>माता का नाम (वैकल्पिक)</label><input class="smother" data-cls="${cname}" placeholder="माता का नाम"></div>
      <div class="field"><label>फोटो (वैकल्पिक)</label><input type="file" accept="image/*" class="sphoto" data-cls="${cname}"></div>
      <div class="field" style="flex:0;"><button class="ghost addStu" data-cls="${cname}">छात्र जोड़ें</button></div></div>
      <table><thead><tr><th>फोटो</th><th>रोल नं.</th><th>नाम</th><th>पिता का नाम</th><th>माता का नाम</th><th></th></tr></thead><tbody>
      ${db.classes[cname].students.map(s=>`<tr><td>${s.photo?`<img class="stu-thumb" src="${s.photo}">`:'<span style="color:var(--muted);">—</span>'}</td><td class="mono">${s.roll}</td><td>${s.name}</td><td>${s.father||s.guardian||'<span style="color:var(--muted);">—</span>'}</td><td>${s.mother||'<span style="color:var(--muted);">—</span>'}</td>
      <td><button class="danger" data-del-stu="${cname}::${s.id}">हटाएं</button></td></tr>`).join('') || `<tr><td colspan="6" style="text-align:center;color:var(--muted);">कोई छात्र नहीं</td></tr>`}
      </tbody></table></div>`);

      const rollInp = section.querySelector(`.sroll[data-cls="${cname}"]`);
      const fatherInp = section.querySelector(`.sfather[data-cls="${cname}"]`);
      const motherInp = section.querySelector(`.smother[data-cls="${cname}"]`);
      const photoInp = section.querySelector(`.sphoto[data-cls="${cname}"]`);
      const name = nameInp.value.trim();
      const roll = rollInp.value.trim() || String(db.classes[cname].students.length+1);
      const father = fatherInp.value.trim();
      const mother = motherInp.value.trim();
      if(!name) return;
      let photo = null;
      if(photoInp.files && photoInp.files[0]){
        try{ photo = await readAndCompressImage(photoInp.files[0]); }
        catch(e){ console.error('photo processing failed', e); }
      }
      db.classes[cname].students.push({id:'s'+Date.now()+Math.random().toString(36).slice(2,6), name, roll, father, mother, photo});
      await saveDB(); render();
    };
    section.querySelector('[data-del-class]').onclick = async ()=>{
      if(!confirm(`क्या "${cname}" कक्षा को हटाना है?`)) return;
      delete db.classes[cname]; await saveDB(); render();
    };
    section.querySelectorAll('[data-del-stu]').forEach(btn=>{
      btn.onclick = async ()=>{
        const [cls, sid] = btn.dataset.delStu.split('::');

    teacherIndex[user] = currentSchoolId;
    await saveTeacherIndex();
    render();
  };
  const rows = wrap.querySelector('#teacherRows');

  if(usernames.length===0) rows.appendChild(el(`<tr><td colspan="5" style="text-align:center;color:var(--muted);">कोई अध्यापक नहीं जोड़ा गया</td></tr>`));

    const tr = el(`<tr><td>${t.name}</td><td class="mono">${u}</td><td class="mono">${t.password}</td>
      <td>${assigns.length ? assigns.map(a=>`${a.cls}/${a.subject}`).join(', ') : '<span style="color:var(--muted);">कोई नहीं</span>'}</td>

      delete teacherIndex[u];

    };

  });
  return wrap;
}

function renderAssign(){
  const wrap = el(`<div class="page"><div class="punch"></div>
    <h2 class="section-title">कक्षा + विषय अध्यापक को असाइन करें</h2>
    <p class="section-sub">विषय का प्रकार चुनें — सामान्य, Theory+Practical वाला (जैसे विज्ञान), या दो प्रश्नपत्र वाला (जैसे हिंदी I/II)</p>

      <div class="field"><label>अध्यापक</label><select id="asgTeacher"></select></div>
      <div class="field"><label>कक्षा</label><select id="asgClass"></select></div>
      <div class="field"><label>विषय का नाम</label><input id="asgSubject" placeholder="जैसे: विज्ञान"></div>
    </div>
    <div class="row">
      <div class="field"><label>विषय का प्रकार</label>
        <select id="asgType">
          <option value="single">सामान्य (एक पेपर)</option>
          <option value="practical">Theory + Practical</option>
          <option value="dual">दो प्रश्नपत्र (Paper I / Paper II)</option>
        </select>
      </div>
    </div>
    <div class="row" id="typeFields"></div>
    <button class="primary" id="asgBtn">असाइन करें</button>
    <table style="margin-top:22px;"><thead><tr><th>अध्यापक</th><th>कक्षा</th><th>विषय</th><th>घटक (Components)</th><th></th></tr></thead>
    <tbody id="asgRows"></tbody></table></div>`);

  const teacherSel = wrap.querySelector('#asgTeacher');
  const classSel = wrap.querySelector('#asgClass');
  Object.keys(db.teachers).forEach(u=> teacherSel.appendChild(el(`<option value="${u}">${db.teachers[u].name} (${u})</option>`)));
  Object.keys(db.classes).forEach(c=> classSel.appendChild(el(`<option value="${c}">${c}</option>`)));
  if(Object.keys(db.teachers).length===0 || Object.keys(db.classes).length===0){
    wrap.insertBefore(el(`<div class="note">पहले "अध्यापक" व "कक्षा व छात्र" टैब में डेटा जोड़ें</div>`), wrap.querySelector('.row'));
  }

  const typeSel = wrap.querySelector('#asgType');
  const typeFields = wrap.querySelector('#typeFields');
  function drawTypeFields(){
    const type = typeSel.value;
    if(type==='single'){
      typeFields.innerHTML = `<div class="field"><label>अधिकतम अंक</label><input id="maxSingle" type="number" value="100"></div>`;
    } else if(type==='practical'){
      typeFields.innerHTML = `
        <div class="field"><label>सिद्धांत (Theory) अधिकतम अंक</label><input id="maxTheory" type="number" value="80"></div>
        <div class="field"><label>प्रयोगात्मक (Practical) अधिकतम अंक</label><input id="maxPractical" type="number" value="20"></div>`;
    } else {
      typeFields.innerHTML = `
        <div class="field"><label>प्रथम प्रश्नपत्र (Paper I) अधिकतम अंक</label><input id="maxP1" type="number" value="50"></div>
        <div class="field"><label>द्वितीय प्रश्नपत्र (Paper II) अधिकतम अंक</label><input id="maxP2" type="number" value="50"></div>`;
    }
  }
  typeSel.onchange = drawTypeFields;
  drawTypeFields();

  wrap.querySelector('#asgBtn').onclick = async ()=>{
    const t = teacherSel.value, c = classSel.value;
    const subject = wrap.querySelector('#asgSubject').value.trim();
    if(!t||!c||!subject) return;
    const type = typeSel.value;
    let components = [];
    if(type==='single'){
      const max = parseFloat(wrap.querySelector('#maxSingle').value)||100;
      components = [{name:MAIN_KEY, max}];
    } else if(type==='practical'){
      const th = parseFloat(wrap.querySelector('#maxTheory').value)||0;
      const pr = parseFloat(wrap.querySelector('#maxPractical').value)||0;
      components = [{name:'सिद्धांत (Theory)', max:th}, {name:'प्रयोगात्मक (Practical)', max:pr}];
    } else {
      const p1 = parseFloat(wrap.querySelector('#maxP1').value)||0;
      const p2 = parseFloat(wrap.querySelector('#maxP2').value)||0;
      components = [{name:'प्रथम प्रश्नपत्र (Paper I)', max:p1}, {name:'द्वितीय प्रश्नपत्र (Paper II)', max:p2}];
    }
    db.assignments[t] = db.assignments[t] || [];
    if(db.assignments[t].some(a=>a.cls===c && a.subject===subject)){ alert('यह विषय इस कक्षा के लिए पहले से असाइन है'); return; }
    db.assignments[t].push({cls:c, subject, components});
    await saveDB(); render();
  };

  const rows = wrap.querySelector('#asgRows');
  let any=false;
  Object.keys(db.assignments).forEach(u=>{
    (db.assignments[u]||[]).forEach((a, idx)=>{
      any=true;
      const compDesc = a.components.map(c=> c.name===MAIN_KEY ? `कुल: ${c.max}` : `${c.name}: ${c.max}`).join(' + ');
      const tr = el(`<tr><td>${db.teachers[u]?db.teachers[u].name:u}</td><td>${a.cls}</td><td>${a.subject}</td>
        <td class="mono" style="font-size:.78rem;">${compDesc}</td>
        <td><button class="danger" data-rm="${u}::${idx}">हटाएं</button></td></tr>`);
      tr.querySelector('[data-rm]').onclick = async ()=>{
        db.assignments[u].splice(idx,1);
        await saveDB(); render();
      };
      rows.appendChild(tr);
    });
  });
  if(!any) rows.appendChild(el(`<tr><td colspan="5" style="text-align:center;color:var(--muted);">कोई असाइनमेंट नहीं</td></tr>`));
  return wrap;
}

// ---- shared helper: subjects list for a class (from assignments) ----
function subjectsForClass(cls){
  const subs = [];
  Object.values(db.assignments).flat().forEach(a=>{
    if(a.cls===cls && !subs.some(s=>s.subject===a.subject)) subs.push(a);
  });
  return subs;
}
function componentValue(exam, cls, subject, compName, studentId){
  return (((((db.marks[exam]||{})[cls]||{})[subject]||{})[compName]||{})[studentId]);
}
function subjectResult(exam, cls, subject, components, studentId){
  let obtained=0, max=0, any=false;
  components.forEach(c=>{
    const v = componentValue(exam, cls, subject, c.name, studentId);
    if(v!==undefined && v!==null && v!==''){ obtained+=parseFloat(v); max+=c.max; any=true; }
  });
  return {obtained, max, any};
}

      if(examChoice==='__all__'){
        let grandObt=0, grandMax=0;
        db.exams.forEach(exam=>{
          let total=0,maxTotal=0;
          subjects.forEach(sub=>{
            const r = subjectResult(exam, cls, sub.subject, sub.components, s.id);
            if(r.any){ total+=r.obtained; maxTotal+=r.max; }
          });
          grandObt+=total; grandMax+=maxTotal;
          const pct = maxTotal>0 ? (total/maxTotal*100) : 0;
          const [gr, grClass] = grade(pct);
          const block = el(`<div class="exam-block">
            <h4>${exam}</h4>

      }

  setTimeout(draw, 0);
  return wrap;
}

// ---------- ADMIT CARD helpers ----------
function hindiDay(dateStr){
  if(!dateStr) return '—';
  const days = ['रविवार','सोमवार','मंगलवार','बुधवार','गुरुवार','शुक्रवार','शनिवार'];
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return '—';
  return days[d.getDay()];
}
function formatDateDMY(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return '—';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function formatTime12(t){
  if(!t) return '—';
  const parts = t.split(':');
  const h = parseInt(parts[0],10), m = parseInt(parts[1],10);
  const period = h>=12 ? 'PM':'AM';
  let hh = h%12; if(hh===0) hh=12;
  return `${hh}:${String(m).padStart(2,'0')} ${period}`;
}

// Builds the admit-card watermark SVG. Covers the full A4 page (210mm x 297mm, used
// here as viewBox units) so it works as a true full-page watermark, not just a small
// centered patch. `settings` = {style, color, opacity, text}. `uid` must be unique per
// card instance (e.g. student id) so multiple admit cards printed together never share
// SVG element ids — shared ids across repeated <svg> blocks is what caused the
// watermark to silently fail to render/print correctly before.
function buildWatermarkSVG(schoolName, settings, uid){
  settings = settings || {};
  const name = ((settings.text && settings.text.trim()) || schoolName || 'विद्यालय').trim();
  const color = settings.color || '#2F5D50';
  const baseOpacity = (settings.opacity!=null) ? settings.opacity : 0.14;
  const style = settings.style || 'rings';
  const density = Math.min(10, Math.max(1, settings.density!=null ? settings.density : 6));
  const thickness = settings.thickness || 'normal';
  const sizeMult = (settings.fontSize!=null ? settings.fontSize : 100)/100; // text size scale (50%–200%)
  const idp = 'wm' + String(uid).replace(/[^a-zA-Z0-9]/g,'') + '_';

  // Thickness → font-weight (only 500/700 are actually loaded for this font, so
  // "bold" is reinforced with an SVG stroke around the glyphs — this is what makes
  // the watermark visibly thicker/thinner in both screen and print reliably).
  const thicknessMap = {
    thin:   {weight:500, stroke:0.05},
    normal: {weight:700, stroke:0.30},
    bold:   {weight:700, stroke:0.85}
  };
  const tk = thicknessMap[thickness] || thicknessMap.normal;
  const strokeAttr = tk.stroke>0 ? `stroke="${color}" stroke-width="${tk.stroke}"` : '';

  // Density → how tightly the pattern repeats/how many rings or turns it has.
  // 1 = बहुत विरल (sparse), 5 = बहुत घना (dense).
  // density is now 1–10 (doubled range/resolution). t=0 → sparsest, t=1 → densest —
  // and the densest end is calibrated roughly 2x tighter than the old 1–5 scale.
  const dt = (density-1)/9;
  const spacingMult = 1.6 - dt*1.3;   // 1→1.6 (wide gaps), 10→0.3 (very tight/dense)
  const ringCount = 4 + Math.round(dt*14); // 1→4 rings, 10→18 rings
  const spiralTurns = 2 + dt*10;       // 1→2, 10→12 turns

  const W = 210, H = 297, cx = W/2, cy = H/2;
  const cornerR = Math.sqrt(cx*cx + cy*cy); // ≈182mm
  const FONT = "'Noto Serif Devanagari',serif";

  function ringsStyle(){
    let defs = '', texts = '';
    for(let i=0;i<ringCount;i++){
      const t = i/(ringCount-1);
      const r = 14 + t*(cornerR-14);
      const size = (6 + t*11)*sizeMult;
      const op = baseOpacity * (1 - t*0.45);
      const id = `${idp}r${i}`;
      defs += `<path id="${id}" d="M ${cx-r},${cy} a ${r},${r} 0 1,1 ${r*2},0 a ${r},${r} 0 1,1 -${r*2},0" fill="none"/>`;
      const circumference = 2*Math.PI*r;
      const approxCharWidth = size*0.6;
      const unit = name + '   •   ';
      const oneRepeatLen = unit.length * approxCharWidth;
      const repeats = Math.max(2, Math.round(circumference / oneRepeatLen));
      const repeatedText = Array(repeats).fill(name).join('   •   ') + '   •   ';
      texts += `<text style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:1px;" fill="${color}" fill-opacity="${op.toFixed(3)}" ${strokeAttr} stroke-opacity="${(op*0.9).toFixed(3)}">
        <textPath href="#${id}" startOffset="0">${repeatedText}</textPath>
      </text>`;
    }
    return `<defs>${defs}</defs>${texts}`;
  }

  function spiralStyle(){
    const maxTheta = spiralTurns * 2 * Math.PI;
    const a = 6;
    const b = (cornerR - a) / maxTheta;
    const pts = [];
    const steps = 260;
    for(let i=0;i<=steps;i++){
      const theta = (i/steps) * maxTheta;
      const r = a + b*theta;
      pts.push(`${(cx + r*Math.cos(theta)).toFixed(2)},${(cy + r*Math.sin(theta)).toFixed(2)}`);
    }
    const id = `${idp}spiral`;
    const pathD = 'M ' + pts.join(' L ');
    const segCount = 4 + density; // denser = more growing text segments along the spiral
    let texts = '';
    for(let i=0;i<segCount;i++){
      const t = i/(segCount-1);
      const offsetPct = (2 + t*88).toFixed(1) + '%';
      const size = (6 + t*8)*sizeMult;
      const op = baseOpacity * (1 - i*(0.5/segCount));
      texts += `<text style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:1px;" fill="${color}" fill-opacity="${Math.max(op,0.03).toFixed(3)}" ${strokeAttr} stroke-opacity="${Math.max(op*0.9,0.03).toFixed(3)}">
        <textPath href="#${id}" startOffset="${offsetPct}">${(name+'   •   ').repeat(6)}</textPath>
      </text>`;
    }
    return `<defs><path id="${id}" d="${pathD}" fill="none"/></defs>${texts}`;
  }

  function singleStyle(){
    const size = 22*sizeMult;
    return `<g transform="rotate(-32 ${cx} ${cy})">
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
        style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:2px;"
        fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${name}</text>
    </g>`;
  }

  function diagonalStyle(){
    const stepX = 60*spacingMult, stepY = 50*spacingMult, size = 9*sizeMult;
    let texts = '';
    for(let y=-stepY; y<=H+stepY; y+=stepY){
      for(let x=-stepX; x<=W+stepX; x+=stepX){
        texts += `<text x="${x}" y="${y}" transform="rotate(-30 ${x} ${y})" text-anchor="middle"
          style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:.5px;"
          fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${name}</text>`;
      }
    }
    return texts;
  }

  function gridStyle(){
    const stepX = 55*spacingMult, stepY = 40*spacingMult, size = 8.5*sizeMult;
    let texts = '';
    for(let y=stepY/2; y<=H; y+=stepY){
      for(let x=stepX/2; x<=W; x+=stepX){
        texts += `<text x="${x}" y="${y}" text-anchor="middle"
          style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:.5px;"
          fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${name}</text>`;
      }
    }
    return texts;
  }

  // सीधी क्षैतिज पंक्तियाँ — no rotation, one continuous repeated line of text
  // across the full width of the page, stacked in rows top to bottom.
  function horizontalStyle(){
    const stepY = 34*spacingMult, size = 9.5*sizeMult;
    const approxCharWidth = size*0.6;
    const unit = name + '   •   ';
    const repeats = Math.max(3, Math.ceil((W+2*unit.length*approxCharWidth) / (unit.length*approxCharWidth)));
    const line = Array(repeats).fill(name).join('   •   ') + '   •   ';
    let texts = '';
    for(let y=stepY/2; y<=H; y+=stepY){
      texts += `<text x="${-unit.length*approxCharWidth}" y="${y}"
        style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:.5px;"
        fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${line}</text>`;
    }
    return texts;
  }

  // सीधी ऊर्ध्वाधर पट्टियाँ — same idea rotated 90°, running top-to-bottom in columns.
  function verticalStyle(){
    const stepX = 34*spacingMult, size = 9.5*sizeMult;
    const approxCharWidth = size*0.6;
    const unit = name + '   •   ';
    const repeats = Math.max(3, Math.ceil((H+2*unit.length*approxCharWidth) / (unit.length*approxCharWidth)));
    const line = Array(repeats).fill(name).join('   •   ') + '   •   ';
    let texts = '';
    for(let x=stepX/2; x<=W; x+=stepX){
      texts += `<text x="${x}" y="${-unit.length*approxCharWidth}" transform="rotate(90 ${x} 0)"
        style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:.5px;"
        fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${line}</text>`;
    }
    return texts;
  }

  let inner;
  switch(style){
    case 'spiral': inner = spiralStyle(); break;
    case 'single': inner = singleStyle(); break;
    case 'diagonal': inner = diagonalStyle(); break;
    case 'grid': inner = gridStyle(); break;
    case 'horizontal': inner = horizontalStyle(); break;
    case 'vertical': inner = verticalStyle(); break;
    case 'rings':
    default: inner = ringsStyle(); break;
  }

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

function renderAdmitCardPrintView(view){
  const {cls, exam, ids} = view;
  const students = ((db.classes[cls]||{}).students||[]).filter(s=> ids.includes(s.id));
  const subjects = subjectsForClass(cls);
  const sched = ((db.examSchedule[exam]||{})[cls]) || {};
  const schoolName = (db.school && db.school.name) ? db.school.name : 'हमारा विद्यालय';
  const schoolAddr = (db.school && db.school.address) ? db.school.address : '';

  const wrap = el(`<div id="admitPrintWrap"></div>`);
  const bar = el(`<div class="admit-card-toolbar no-print">
    <button class="ghost" id="acBack">← वापस</button>
    <button class="primary" id="acDoPrint">प्रिंट करें</button>
    <span style="color:var(--muted);font-size:.85rem;">कुल ${students.length} प्रवेश पत्र तैयार</span>
  </div>`);
  bar.querySelector('#acBack').onclick = ()=>{ ui.admitPrintView=null; render(); };
  bar.querySelector('#acDoPrint').onclick = ()=> window.print();
  wrap.appendChild(bar);

  const sortedSubjects = subjects.slice().sort((a,b)=>{
    const da = (sched[a.subject]||{}).date || '9999-99-99';
    const db_ = (sched[b.subject]||{}).date || '9999-99-99';
    return da.localeCompare(db_);
  });

  const wmSettings = db.watermark || {enabled:true, style:'rings', color:'#2F5D50', opacity:0.14, text:''};
  const wmEnabled = wmSettings.enabled !== false;
  const allInstructions = [
    'यह प्रवेश पत्र प्रत्येक परीक्षा में साथ लाना अनिवार्य है।',
    'परीक्षा शुरू होने से 30 मिनट पहले परीक्षा कक्ष में उपस्थित हों।',
    'मोबाइल फोन व अन्य इलेक्ट्रॉनिक उपकरण परीक्षा कक्ष में वर्जित हैं।',
    'प्रवेश पत्र खो जाने पर तुरंत कक्षा अध्यापक/कार्यालय को सूचित करें।',
    ...(db.customInstructions || [])
  ];

  students.forEach(s=>{
    const card = el(`<div class="admit-card"></div>`);
    if(wmEnabled){
      const watermarkSVG = buildWatermarkSVG(schoolName, wmSettings, s.id);
      card.appendChild(el(`<div class="ac-watermark">${watermarkSVG}</div>`));
    }
    card.appendChild(el(`<div class="ac-header">
      <div class="ac-school-name">${schoolName}</div>
      ${schoolAddr?`<div class="ac-school-addr">${schoolAddr}</div>`:''}
      <div class="ac-admit-title">प्रवेश पत्र · ADMIT CARD</div>
      <div class="ac-exam-sub">${exam}</div>
    </div>`));
    card.appendChild(el(`<div class="ac-main">
      <div class="ac-photo">${s.photo ? `<img src="${s.photo}">` : 'विद्यार्थी<br>फोटो'}</div>
      <div class="ac-details"><table>
        <tr><td class="k">छात्र का नाम</td><td>${s.name}</td></tr>
        <tr><td class="k">पिता का नाम</td><td>${s.father || s.guardian || '—'}</td></tr>
        <tr><td class="k">माता का नाम</td><td>${s.mother || '—'}</td></tr>
        <tr><td class="k">कक्षा</td><td>${cls}</td></tr>
        <tr><td class="k">रोल नंबर</td><td class="mono">${s.roll}</td></tr>
      </table></div>
    </div>`));
    const schedRows = sortedSubjects.map((sub,i)=>{
      const e = sched[sub.subject] || {};
      return `<tr><td class="mono">${i+1}</td><td>${sub.subject}</td><td>${formatDateDMY(e.date)}</td><td>${hindiDay(e.date)}</td><td>${formatTime12(e.time)}</td></tr>`;
    }).join('') || `<tr><td colspan="5" style="text-align:center;color:var(--muted);">परीक्षा तालिका अभी नहीं भरी गई</td></tr>`;
    card.appendChild(el(`<div class="ac-sched">
      <h4>परीक्षा तालिका (Exam Schedule)</h4>
      <table><thead><tr><th>क्रम</th><th>विषय</th><th>दिनांक</th><th>दिन</th><th>समय</th></tr></thead>
      <tbody>${schedRows}</tbody></table>
    </div>`));
    card.appendChild(el(`<div class="ac-instructions">
      <h5>परीक्षार्थियों के लिए निर्देश</h5>
      <ul>${allInstructions.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>`));
    card.appendChild(el(`<div class="ac-signatures">
      <div class="ac-sig"><div class="line">कक्षा अध्यापक</div></div>
      <div class="ac-sig"><div class="line">प्राचार्य</div></div>
      <div class="ac-sig"><div class="line">अभिभावक हस्ताक्षर</div></div>
    </div>`));
    wrap.appendChild(card);
  });
  return wrap;
}

// ---------- TEACHER ----------
function renderTeacherTab(){
  const u = session.username;
  const assigns = db.assignments[u] || [];

  if(ui.teacherTab){
    const a = ui.teacherTab;
    const cls = a.cls, subject = a.subject, components = a.components;
    if(!ui.examTab) ui.examTab = db.exams[0];
    const exam = ui.examTab;

    const wrap = el(`<div class="page"><div class="punch"></div>
      <button class="ghost no-print" id="backBtn" style="margin-bottom:16px;">← वापस मेरी कक्षाओं में</button>
      <h2 class="section-title">${cls} — ${subject}</h2>
      <p class="section-sub">परीक्षा चुनें, फिर हर छात्र के अंक भरकर सेव करें</p>
      <div class="exam-tabbar no-print" id="examTabbar"></div>
      <table><thead><tr><th>रोल नं.</th><th>नाम</th>
        ${components.map(c=>`<th class="num">${c.name===MAIN_KEY?'अंक':c.name} (${c.max})</th>`).join('')}
        ${components.length>1?'<th class="num">कुल</th>':''}
      </tr></thead><tbody id="markRows"></tbody></table>
      <button class="primary" id="saveMarks" style="margin-top:14px;">अंक सेव करें</button>
      <span id="savedMsg" style="margin-left:10px;color:var(--chalk);font-size:.85rem;"></span>
      <div id="markErr" style="color:var(--redpen);font-size:.85rem;margin-top:8px;"></div>
    </div>`);

    wrap.querySelector('#backBtn').onclick = ()=>{ ui.teacherTab=null; ui.examTab=null; render(); };

    const examTabbar = wrap.querySelector('#examTabbar');
    db.exams.forEach(ex=>{
      const b = el(`<button class="${ex===exam?'active':''}">${ex}</button>`);
      b.onclick = ()=>{ ui.examTab = ex; render(); };
      examTabbar.appendChild(b);
    });

    const students = (db.classes[cls]||{}).students || [];
    const rows = wrap.querySelector('#markRows');
    if(students.length===0){
      rows.appendChild(el(`<tr><td colspan="${2+components.length+(components.length>1?1:0)}" style="text-align:center;color:var(--muted);">इस कक्षा में कोई छात्र नहीं है</td></tr>`));
    }
    students.forEach(s=>{
      const tr = el(`<tr></tr>`);
      tr.appendChild(el(`<td class="mono">${s.roll}</td>`));
      tr.appendChild(el(`<td>${s.name}</td>`));
      const inputs = [];
      components.forEach(c=>{
        const existing = componentValue(exam, cls, subject, c.name, s.id);
        const td = el(`<td class="num"><input type="number" min="0" max="${c.max}" style="width:80px;text-align:center;" data-comp="${c.name}" data-sid="${s.id}" value="${existing ?? ''}"></td>`);
        inputs.push(td.querySelector('input'));
        tr.appendChild(td);
      });
      let totalCell = null;
      if(components.length>1){
        totalCell = el(`<td class="num mono" data-total-for="${s.id}">—</td>`);
        tr.appendChild(totalCell);
      }
      function recomputeTotal(){
        let sum=0, any=false;
        inputs.forEach(inp=>{ if(inp.value!==''){ sum+=parseFloat(inp.value)||0; any=true; } });
        if(totalCell) totalCell.textContent = any ? sum : '—';
      }
      function validateInput(inp){
        const compMax = parseFloat(inp.max);
        const v = inp.value.trim();
        let bad = false;
        if(v!==''){
          const num = parseFloat(v);
          if(isNaN(num) || num>compMax || num<0) bad = true;
        }
        inp.classList.toggle('mark-invalid', bad);
        return !bad;
      }
      inputs.forEach(inp=> inp.addEventListener('input', ()=>{ recomputeTotal(); validateInput(inp); }));
      inputs.forEach(inp=> validateInput(inp));
      recomputeTotal();
      rows.appendChild(tr);
    });

    wrap.querySelector('#saveMarks').onclick = async ()=>{
      const errBox = wrap.querySelector('#markErr');
      errBox.textContent = '';
      const allInputs = Array.from(rows.querySelectorAll('input[data-comp]'));
      let firstBad = null;
      const badList = [];
      allInputs.forEach(inp=>{
        const comp = inp.dataset.comp, sid = inp.dataset.sid;
        const compMax = components.find(c=>c.name===comp).max;
        const v = inp.value.trim();
        let bad = false;
        if(v!==''){
          const num = parseFloat(v);
          if(isNaN(num) || num>compMax || num<0) bad = true;
        }
        inp.classList.toggle('mark-invalid', bad);
        if(bad){
          if(!firstBad) firstBad = inp;
          const tr = inp.closest('tr');
          const rollTd = tr ? tr.querySelector('td.mono') : null;
          badList.push(`रोल ${rollTd?rollTd.textContent:'?'} — ${comp==='मुख्य'?'अंक':comp} (अधिकतम ${compMax})`);
        }
      });
      if(firstBad){
        errBox.textContent = 'ये अंक अधिकतम सीमा से ज़्यादा हैं, कृपया ठीक करें: ' + badList.join('; ');
        firstBad.focus();
        firstBad.scrollIntoView({behavior:'smooth', block:'center'});
        return;
      }
      db.marks[exam] = db.marks[exam] || {};
      db.marks[exam][cls] = db.marks[exam][cls] || {};
      db.marks[exam][cls][subject] = db.marks[exam][cls][subject] || {};
      components.forEach(c=>{
        db.marks[exam][cls][subject][c.name] = db.marks[exam][cls][subject][c.name] || {};
      });
      allInputs.forEach(inp=>{
        const comp = inp.dataset.comp, sid = inp.dataset.sid;
        const v = inp.value.trim();
        if(v===''){ delete db.marks[exam][cls][subject][comp][sid]; }
        else {
          db.marks[exam][cls][subject][comp][sid] = parseFloat(v);
        }
      });
      await saveDB();
      wrap.querySelector('#savedMsg').textContent = 'सेव हो गया ✓';
      setTimeout(()=>{ const m=wrap.querySelector('#savedMsg'); if(m) m.textContent=''; }, 2000);
    };
    return wrap;
  }

  const wrap = el(`<div class="page"><div class="punch"></div>
    <h2 class="section-title">मेरी कक्षाएँ व विषय</h2>
    <p class="section-sub">जिस कक्षा/विषय पर क्लिक करेंगे, वहाँ परीक्षा चुनकर अंक भर सकते हैं</p>
    <div class="card-grid" id="assignGrid"></div></div>`);
  const grid = wrap.querySelector('#assignGrid');
  if(assigns.length===0){
    grid.appendChild(el(`<div class="empty">आपको अभी कोई कक्षा/विषय असाइन नहीं हुआ है। एडमिन से संपर्क करें।</div>`));
  }
  assigns.forEach(a=>{
    const studentCount = ((db.classes[a.cls]||{}).students||[]).length;
    const typeLabel = a.components.length===1 ? '' : (a.components[0].name.includes('Practical')||a.components[1] && a.components[1].name.includes('Practical') ? '<span class="type-tag">Theory+Practical</span>' : '<span class="type-tag">दो प्रश्नपत्र</span>');
    const card = el(`<div class="assign-card">
      <div class="cls">कक्षा ${a.cls}</div>
      <div class="sub">${a.subject} ${typeLabel}</div>
      <div class="meta">${studentCount} छात्र · घटक: ${a.components.map(c=>c.name===MAIN_KEY?'—':c.name).filter(Boolean).join(', ')||'सामान्य'}</div>
    </div>`);
    card.onclick = ()=>{ ui.teacherTab = a; ui.examTab = null; render(); };
    grid.appendChild(card);
  });
  return wrap;
}

// ---------- INIT ----------
(async function init(){
  document.getElementById('app').innerHTML = '<div class="page" style="text-align:center;color:var(--muted);">लोड हो रहा है…</div>';
  try{ await firebase.auth().signInAnonymously(); }
  catch(e){ console.error('firebase anonymous sign-in failed', e); }
  await loadRegistry();
  await loadTeacherIndex();
  render();
})();
</script>
