<style>

  button.ghost:hover{background:rgba(47,93,80,.08);}
  button.danger{background:transparent;border:1px solid var(--redpen);color:var(--redpen);padding:6px 10px;border-radius:4px;cursor:pointer;font-size:.78rem;}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.87rem;}
  th,td{padding:7px 9px;border-bottom:1px solid var(--line);text-align:left;}
  th{color:var(--muted);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;}
  td.num, th.num{text-align:center;}
  tr:hover td{background:rgba(47,93,80,.04);}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:10px;}

  .empty{color:var(--muted);font-size:.85rem;padding:18px 0;text-align:center;}

  .rc-student-box{border:1px solid var(--ink);border-radius:6px;padding:6px 20px;margin-bottom:7px;background:#FCFAF4;display:grid;grid-template-columns:1fr 1fr;row-gap:4px;column-gap:20px;}
  .rc-student-box .sd-cell{font-size:.9rem;display:flex;align-items:baseline;gap:6px;flex-wrap:nowrap;}
  .rc-student-box .sd-cell .sd-label{color:var(--muted);font-size:.78rem;white-space:nowrap;}

  .rc-sign-line{border-top:1px solid var(--ink);margin:0 8px 6px;}

  .exam-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:2px;justify-content:center;}
  .exam-box{border:1px solid var(--line);border-radius:6px;padding:10px;box-sizing:border-box;flex:1 1 calc(33.333% - 7px);min-width:150px;max-width:calc(33.333% - 7px);}

  .exam-box tbody tr:nth-child(even) td{background:rgba(47,93,80,.06);}
  .comp-breakup{font-size:.85em;color:var(--muted);margin-top:1px;font-family:'Noto Sans Devanagari',sans-serif;font-weight:400;}
  .exam-box .summary{display:block;font-size:.75rem;margin-top:3px;}
  .exam-box .summary div{margin-bottom:1px;display:flex;justify-content:space-between;}
  .exam-box .summary div b{font-family:'IBM Plex Mono',monospace;font-size:.75rem;}
  .grand-total-box{border:none;background:transparent;padding:2px 4px;box-sizing:border-box;}
  .exam-grid .grand-total-box{flex:1 1 calc(33.333% - 7px);min-width:230px;}
  .grand-total-box.gtb-standalone{margin-top:7px;width:100%;}
  .grand-total-box .summary{display:flex;gap:54px;flex-wrap:wrap;font-size:.75rem;justify-content:center;}
  .grand-total-box .summary div b{display:block;font-family:'IBM Plex Mono',monospace;font-size:.75rem;}
  .grand-total-box .gt-label{font-family:'Noto Serif Devanagari',serif;font-weight:700;color:var(--chalk);font-size:.75rem;text-align:center;margin-bottom:4px;}
  @media(max-width:700px){.exam-box{flex-basis:100%;max-width:100%;}}
  .rc-combined-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .rc-combined-table{width:auto;max-width:100%;border-collapse:collapse;margin:10px auto 0;table-layout:auto;}
  .rc-combined-table thead th{background:#173A63;color:#fff;font-family:'Noto Sans Devanagari',sans-serif;font-weight:700;font-size:.7rem;line-height:1.25;padding:6px 5px;border:1px solid #2C517F;text-align:center;vertical-align:middle;word-break:break-word;}
  .rc-combined-table thead th .rc-maxline{display:block;font-weight:400;font-size:.62rem;opacity:.85;margin-top:2px;white-space:normal;}
  .rc-combined-table thead th.rc-th-sr{width:1%;white-space:nowrap;}
  .rc-combined-table thead th.rc-th-subj{text-align:left;width:1%;min-width:78px;white-space:nowrap;word-break:normal;}
  .rc-combined-table tbody td{border:1px solid #CBD3E1;padding:6px 6px;font-size:.76rem;text-align:center;color:var(--ink);word-break:break-word;}
  .rc-combined-table tbody tr:nth-child(even) td{background:#F6F8FB;}
  .rc-combined-table tbody td.rc-sr-cell{text-align:center;color:var(--muted);white-space:nowrap;}
  .rc-combined-table tbody td.rc-subj-cell{text-align:left;font-weight:600;font-family:'Noto Serif Devanagari',serif;white-space:nowrap;word-break:normal;min-width:78px;}
  .rc-combined-table tbody tr.rc-total-row td{background:#E7ECF6;font-weight:700;border-top:2px solid #173A63;}
  .rc-combined-table tbody tr.rc-total-row td.rc-subj-cell{text-align:left;}
  .exam-tabbar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .exam-tabbar button{background:#fff;border:1px solid var(--line);color:var(--muted);padding:7px 14px;border-radius:16px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;}
  .exam-tabbar button.active{background:var(--chalk);border-color:var(--chalk);color:#fff;}
  .type-tag{display:inline-block;font-size:.68rem;padding:1px 7px;border-radius:8px;background:rgba(47,93,80,.12);color:var(--chalk);margin-left:6px;}

  /* ---- Admit Card ---- */
  #admitPrintWrap{padding:0 0 30px;}

    width:210mm;min-height:297mm;margin:0 auto 26px;background:#fff;
    border:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.08);

  .admit-card .ac-instructions{margin-top:16px;font-size:.78rem;color:#7A5A15;background:#FBF3E4;border:1px solid #EBD9AF;padding:10px 14px;border-radius:5px;}

  .admit-card .ac-sig{text-align:center;font-size:.8rem;color:var(--muted);width:28%;}
  .admit-card .ac-sig .line{border-top:1px solid var(--ink);margin-bottom:5px;padding-top:5px;}
  .admit-card-toolbar{display:flex;gap:10px;padding:14px 4px 20px;flex-wrap:wrap;align-items:center;}
  .wm-settings{background:#F9F7F0;border:1px solid var(--line);border-radius:6px;padding:16px 16px 6px;margin:14px 0 18px;}
  .wm-settings h4{margin:0 0 10px;color:var(--chalk);font-size:1rem;font-family:'Noto Serif Devanagari',serif;}
  .sched-editor input[type="date"], .sched-editor input[type="time"]{width:100%;}
  .stu-pick-row{display:flex;align-items:center;gap:10px;padding:6px 2px;border-bottom:1px solid var(--line);font-size:.88rem;}
  .stu-pick-row .roll{width:56px;color:var(--muted);}
  .stu-thumb{width:26px;height:32px;object-fit:cover;border-radius:2px;border:1px solid var(--line);vertical-align:middle;}
  textarea{font-family:inherit;font-size:.88rem;padding:8px 10px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink);width:100%;resize:vertical;}

  @page{ size:A4; margin:10mm; }
  @media print{
    html, body{background:#fff !important;}
    header.top, nav.tabs, .no-print{display:none !important;}
    .page{box-shadow:none;border:none;padding:0;background:transparent;}
    .page::before,.page .punch{display:none;}
    main{max-width:100%;margin:0;padding:0;}
    .admit-card{box-shadow:none;border:none;margin:0;width:100%;min-height:0;page-break-after:always;}
    .admit-card:last-of-type{page-break-after:auto;}
    .report-card{box-shadow:none;border:none;margin:0 auto;}
    #admitPrintWrap{padding:0;}
  }
  @media (max-width:600px){ .page{padding:20px 16px;} .page::before,.page .punch{display:none;} }
</style>

    return {key, value, shared: !!shared};
  },
  async delete(key, shared){
    await authReady;
    await fbDB.ref('data/' + encodeFbKey(key)).remove();
    return {key, deleted: true, shared: !!shared};
  },
  async list(prefix, shared){
    await authReady;
    const snap = await fbDB.ref('data').get();
    if(!snap.exists()) return {keys: [], prefix, shared: !!shared};
    const allKeys = Object.keys(snap.val()).map(decodeFbKey);
    const filtered = prefix ? allKeys.filter(k=>k.startsWith(prefix)) : allKeys;
    return {keys: filtered, prefix, shared: !!shared};
  }
};

async function exportAllData(){

  a.href = url;

async function importAllData(file){
  const text = await file.text();
  let payload;
  try{ payload = JSON.parse(text); }
  catch(e){ throw new Error('यह एक मान्य JSON फ़ाइल नहीं है'); }
  if(!payload || !Array.isArray(payload.registry) || typeof payload.schools !== 'object'){
    throw new Error('यह एक मान्य बैकअप फ़ाइल नहीं है');

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function readAndCompressImage(file){
  return new Promise((resolve, reject)=>{
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const targetW = 180, targetH = 220;
        const canvas = document.createElement('canvas');
        canvas.width = targetW; canvas.height = targetH;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(targetW/img.width, targetH/img.height);
        const sw = targetW/scale, sh = targetH/scale;
        const sx = (img.width-sw)/2, sy = (img.height-sh)/2;
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = ()=> reject(new Error('image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

function readLogoImage(file){
  return new Promise((resolve, reject)=>{
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 220;
        const scale = Math.min(1, maxDim/Math.max(img.width, img.height));
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = ()=> reject(new Error('image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

// Reads a full-page background image (e.g. for the Admit Card A4 page). Scaled to
// A4 proportions at print-safe resolution (~150dpi -> 1240x1754) and compressed as
// JPEG to keep it lightweight enough to store alongside the rest of the school data.
function readBackgroundImage(file){
  return new Promise((resolve, reject)=>{
    if(!file){ resolve(null); return; }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 1240, maxH = 1754;
        const scale = Math.min(1, maxW/img.width, maxH/img.height);
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = ()=> reject(new Error('image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('file read failed'));
    reader.readAsDataURL(file);
  });
}

// ---- shared helper: subjects list for a class (from assignments) ----
function subjectsForClass(cls){
  const subs = [];
  Object.values(db.assignments).flat().forEach(a=>{
    if(a.cls===cls && !subs.some(s=>s.subject===a.subject)) subs.push(a);
  });
  return subs;
}
function componentValue(exam, cls, subject, compName, studentId){
  return (((((db.marks[exam]||{})[cls]||{})[subject]||{})[compName]||{})[studentId]);
}
// A component's max marks can now differ per exam (तिमाही vs अर्धवार्षिक vs वार्षिक आदि).
// New data stores it as c.maxByExam = {examName: value}. Older saved data has a single
// c.max number that applied to every exam — keep that working as a fallback.
function compMax(c, exam){
  if(c.maxByExam){
    if(Object.prototype.hasOwnProperty.call(c.maxByExam, exam)) return c.maxByExam[exam]||0;
    const vals = Object.values(c.maxByExam);
    return vals.length ? (vals[0]||0) : 0; // exam added later than this assignment — best-effort fallback
  }
  return c.max||0;
}
function subjectResult(exam, cls, subject, components, studentId){
  let obtained=0, max=0, any=false;
  components.forEach(c=>{
    const v = componentValue(exam, cls, subject, c.name, studentId);
    if(v!==undefined && v!==null && v!==''){ obtained+=parseFloat(v); max+=compMax(c, exam); any=true; }
  });
  return {obtained, max, any};
}

function fitGrandTotalBoxes(host){
  const REF_WIDTH = 260; // width of a squeezed (side-by-side) box — base font-sizes look right here
  host.querySelectorAll('.grand-total-box').forEach(box=>{
    const label = box.querySelector('.gt-label');
    const summary = box.querySelector('.summary');
    if(!label || !summary) return;
    const width = box.clientWidth;
    let scale = width / REF_WIDTH;
    scale = Math.max(0.75, Math.min(2.3, scale));
    label.style.fontSize = (0.38*scale).toFixed(2) + 'rem';
    summary.style.fontSize = (0.36*scale).toFixed(2) + 'rem';
    summary.querySelectorAll('b').forEach(b=> b.style.fontSize = (0.44*scale).toFixed(2)+'rem');
    box.style.padding = (2*scale).toFixed(1)+'px ' + (4*scale).toFixed(1)+'px';
  });
}
function fitSchoolNames(host){
  host.querySelectorAll('.rc-school-name').forEach(nameEl=>{
    nameEl.style.fontSize = '';
    const container = nameEl.parentElement;
    let fontSize = parseFloat(getComputedStyle(nameEl).fontSize);
    const minFontSize = fontSize * 0.4;
    let guard = 0;
    while(nameEl.scrollWidth > container.clientWidth && fontSize > minFontSize && guard < 40){
      fontSize -= 1;
      nameEl.style.fontSize = fontSize + 'px';
      guard++;
    }
  });
}
function fitReportCardsToPage(host){
  // Shrinks each report card's content so it always fits on a single A4 page,
  // no matter how many exams/subjects it contains, or how long the language's
  // text is (e.g. English exam/subject names are longer than Hindi) —
  // never spills to a 2nd sheet and never gets clipped sideways.
  requestAnimationFrame(()=>{
    fitSchoolNames(host);
    fitGrandTotalBoxes(host);
    host.querySelectorAll('.report-card').forEach(card=>{
      const inner = card.querySelector('.rc-inner');
      if(!inner) return;
      inner.style.transform = 'scale(1)';
      const availH = card.clientHeight;
      const availW = card.clientWidth;
      const neededH = inner.scrollHeight;
      const neededW = inner.scrollWidth;
      const scaleH = neededH > availH && neededH > 0 ? (availH / neededH) : 1;
      const scaleW = neededW > availW && neededW > 0 ? (availW / neededW) : 1;
      const scale = Math.min(scaleH, scaleW) * 0.99;
      if(scale < 1){
        inner.style.transform = `scale(${Math.max(0.4, scale)})`;
      }
    });
  });
}

function examLabel(name, lang){
  if(lang !== 'en') return name;
  const raw = String(name).trim();
  // exact match first (covers the original, un-numbered exam names)
  if(EXAM_NAME_EN[raw]) return EXAM_NAME_EN[raw];
  // handle numbered variants like "तिमाही परीक्षा2", "तिमाही परीक्षा 3", "तिमाही परीक्षा4"
  const m = raw.match(/^(.*?)\s*([0-9]+)$/);
  if(m){
    const base = m[1].trim();
    const num = m[2];
    if(EXAM_NAME_EN[base]) return `${EXAM_NAME_EN[base]} ${num}`;
  }
  return name;
}

      const r = subjectResult(exam, cls, sub.subject, sub.components, sid);
      let breakup = '';
      if(sub.components.length > 1){
        breakup = `<div class="comp-breakup">${sub.components.map(c=>{
          const v = componentValue(exam, cls, sub.subject, c.name, sid);
          const shown = (v!==undefined && v!==null && v!=='') ? v : '—';
          return `${shortCompLabel(c.name)}: ${shown}`;
        }).join(' · ')}</div>`;
      }
      return `<tr><td class="rc-subj-cell">${sub.subject}${breakup}</td><td class="mono">${r.any? r.obtained : '—'}</td><td class="mono">${r.any? r.max : '—'}</td></tr>`;
    }).join('');
  }
  function subjectConfiguredMax(sub, exam){
    return sub.components.reduce((s,c)=> s + compMax(c, exam), 0);
  }
  // Each exam column gets its own max-marks label now (तिमाही का पूर्णांक अलग, अर्धवार्षिक/वार्षिक का अलग हो सकता है)
  function examHeaderMax(subjects, exam){
    if(subjects.length===0) return null;
    const first = subjectConfiguredMax(subjects[0], exam);
    const allSame = subjects.every(sub=> subjectConfiguredMax(sub, exam)===first);
    return allSame ? first : null;
  }
  function combinedTableHTML(cls, subjects, sid, exams, lang){
    const L = RC_LABELS[lang];
    const examCols = exams.map(ex=>{
      const headerMax = examHeaderMax(subjects, ex);
      return `<th>${examLabel(ex, lang)}${headerMax!=null? `<span class="rc-maxline">(${L.maxFull}: ${headerMax})</span>` : ''}</th>`;
    }).join('');
    const bodyRows = subjects.map((sub,i)=>{
      const cells = exams.map(ex=>{
        const r = subjectResult(ex, cls, sub.subject, sub.components, sid);
        return `<td class="mono">${r.any? r.obtained : '—'}</td>`;
      }).join('');
      return `<tr><td class="rc-subj-cell">${sub.subject}</td>${cells}</tr>`;
    }).join('');
    const totalCells = exams.map(ex=>{
      let obt=0, max=0;
      subjects.forEach(sub=>{
        const r = subjectResult(ex, cls, sub.subject, sub.components, sid);
        if(r.any) obt += r.obtained;
        max += subjectConfiguredMax(sub, ex);
      });
      return `<td class="mono">${max>0? `${obt} / ${max}` : '—'}</td>`;
    }).join('');
    return `<div class="rc-combined-scroll"><table class="rc-combined-table">
      <thead><tr><th class="rc-th-subj">${L.subject}</th>${examCols}</tr></thead>
      <tbody>${bodyRows}<tr class="rc-total-row"><td class="rc-subj-cell">${L.total}</td>${totalCells}</tr></tbody>
    </table></div>`;
  }

  function draw(){
    const cls = classSel.value;
    const examChoice = examSel.value;
    const lang = langSel.value || 'hi';
    const L = RC_LABELS[lang];
    const host = wrap.querySelector('#repHost');
    host.innerHTML='';
    if(!cls){ host.appendChild(el(`<div class="empty">कोई कक्षा उपलब्ध नहीं</div>`)); return; }
    const students = db.classes[cls].students;
    const subjects = subjectsForClass(cls);
    if(students.length===0){ host.appendChild(el(`<div class="empty">इस कक्षा में कोई छात्र नहीं है</div>`)); return; }
    if(subjects.length===0){ host.appendChild(el(`<div class="empty">इस कक्षा के लिए कोई विषय असाइन नहीं है</div>`)); return; }

    const schoolName = (db.school && db.school.name) ? db.school.name : L.defaultSchool;
    const schoolAddr = (db.school && db.school.address) ? db.school.address : '';
    const schoolLogo = (db.school && db.school.logo) ? db.school.logo : '';
    const schoolSession = sessionInp.value.trim();
    students.forEach(s=>{
      const bgStyle = db.reportBgImage ? ` style="background-image:url('${db.reportBgImage}');background-size:cover;background-position:center;background-repeat:no-repeat;"` : '';
      const card = el(`<div class="report-card"${bgStyle}></div>`);
      const inner = el(`<div class="rc-inner"></div>`);
      card.appendChild(inner);
      inner.appendChild(el(`<div class="rc-header">
        ${schoolLogo?`<img class="rc-logo" src="${schoolLogo}">`:''}
        <div class="rc-school-name">${schoolName}</div>
        ${schoolAddr?`<div class="rc-school-addr">${schoolAddr}</div>`:''}
        <div class="rc-title">${L.title}</div>
        ${schoolSession?`<div class="rc-session">${L.session}: ${schoolSession}</div>`:''}
      </div>`));
      inner.appendChild(el(`<div class="rc-student-box">
        <div class="sd-cell"><span class="sd-label">${L.name}</span><span class="sd-value">${s.name}</span></div>
        <div class="sd-cell"><span class="sd-label">${L.father}</span><span class="sd-value">${s.father || s.guardian || '—'}</span></div>
        <div class="sd-cell"><span class="sd-label">${L.dob}</span><span class="sd-value">${s.dob ? formatDateDMY(s.dob) : '—'}</span></div>
        <div class="sd-cell"><span class="sd-label">${L.mother}</span><span class="sd-value">${s.mother || '—'}</span></div>
        <div class="sd-cell"><span class="sd-label">${L.cls}</span><span class="sd-value">${cls}</span></div>
        <div class="sd-cell"><span class="sd-label">${L.roll}</span><span class="sd-value">${s.roll}</span></div>
      </div>`));

      if(examChoice==='__all__'){
        let grandObt=0, grandMax=0;
        db.exams.forEach(exam=>{
          subjects.forEach(sub=>{
            const r = subjectResult(exam, cls, sub.subject, sub.components, s.id);
            if(r.any){ grandObt+=r.obtained; grandMax+=r.max; }
          });
        });
        inner.appendChild(el(combinedTableHTML(cls, subjects, s.id, db.exams, lang)));
        const gpct = grandMax>0 ? (grandObt/grandMax*100) : 0;
        const [ggr, ggrClass] = grade(gpct);
        inner.appendChild(el(`<div class="grand-total-box gtb-standalone">
          <div class="gt-label">${L.annualResult}</div>
          <div class="summary"><div>${L.totalObtained} <b>${grandObt} / ${grandMax}</b></div>
          <div>${L.totalPercentage} <b>${grandMax>0?gpct.toFixed(1):'0.0'}%</b></div>
          <div>${L.finalGrade} <b class="${ggrClass}">${grandMax>0?ggr:'—'}</b></div></div>
        </div>`));
      } else {
        const exam = examChoice;
        let total=0,maxTotal=0;
        subjects.forEach(sub=>{
          const r = subjectResult(exam, cls, sub.subject, sub.components, s.id);
          if(r.any){ total+=r.obtained; maxTotal+=r.max; }
        });
        const pct = maxTotal>0 ? (total/maxTotal*100) : 0;
        const [gr, grClass] = grade(pct);
        inner.appendChild(el(`<table class="rc-combined-table"><thead><tr><th class="rc-th-subj">${L.subject}</th><th>${L.obtainedFull}</th><th>${L.maxFull}</th></tr></thead>
          <tbody>${subjectTableRows(exam, cls, subjects, s.id)}
          <tr class="rc-total-row"><td class="rc-subj-cell">${L.total}</td><td class="mono">${total}</td><td class="mono">${maxTotal}</td></tr>
          </tbody></table>`));
        inner.appendChild(el(`<div class="grand-total-box gtb-standalone">
          <div class="gt-label">${L.grandTotal}</div>
          <div class="summary"><div>${L.totalMarks} <b>${total} / ${maxTotal}</b></div>
          <div>${L.percentage} <b>${maxTotal>0?pct.toFixed(1):'0.0'}%</b></div>
          <div>${L.grade} <b class="${grClass}">${maxTotal>0?gr:'—'}</b></div></div>
        </div>`));
      }
      inner.appendChild(el(`<div class="rc-signrow">
        <div class="rc-sign"><div class="rc-sign-line"></div><div class="rc-sign-label">${L.parentSign}</div></div>
        <div class="rc-sign"><div class="rc-sign-line"></div><div class="rc-sign-label">${L.teacherSign}</div></div>
        <div class="rc-sign"><div class="rc-sign-line"></div><div class="rc-sign-label">${L.principalSign}</div></div>
      </div>`));
      host.appendChild(card);
    });
    fitReportCardsToPage(host);
  }
  classSel.onchange = draw; examSel.onchange = draw; langSel.onchange = draw;
  sessionInp.addEventListener('input', ()=>{
    draw();
    db.school.session = sessionInp.value.trim();
    saveDB();
  });
  setTimeout(draw, 0);
  return wrap;
}

// ---------- ADMIT CARD helpers ----------
function hindiDay(dateStr){
  if(!dateStr) return '—';
  const days = ['रविवार','सोमवार','मंगलवार','बुधवार','गुरुवार','शुक्रवार','शनिवार'];
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return '—';
  return days[d.getDay()];
}
function formatDateDMY(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return '—';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function formatTime12(t){
  if(!t) return '—';
  const parts = t.split(':');
  const h = parseInt(parts[0],10), m = parseInt(parts[1],10);
  const period = h>=12 ? 'PM':'AM';
  let hh = h%12; if(hh===0) hh=12;
  return `${hh}:${String(m).padStart(2,'0')} ${period}`;
}

// Builds the admit-card watermark SVG. Covers the full A4 page (210mm x 297mm, used
// here as viewBox units) so it works as a true full-page watermark, not just a small
// centered patch. `settings` = {style, color, opacity, text}. `uid` must be unique per
// card instance (e.g. student id) so multiple admit cards printed together never share
// SVG element ids — shared ids across repeated <svg> blocks is what caused the
// watermark to silently fail to render/print correctly before.
function buildWatermarkSVG(schoolName, settings, uid){
  settings = settings || {};
  const name = ((settings.text && settings.text.trim()) || schoolName || 'विद्यालय').trim();
  const color = settings.color || '#2F5D50';
  const baseOpacity = (settings.opacity!=null) ? settings.opacity : 0.14;
  const style = settings.style || 'rings';
  const density = Math.min(10, Math.max(1, settings.density!=null ? settings.density : 6));
  const thickness = settings.thickness || 'normal';
  const sizeMult = (settings.fontSize!=null ? settings.fontSize : 100)/100; // text size scale (50%–200%)
  const idp = 'wm' + String(uid).replace(/[^a-zA-Z0-9]/g,'') + '_';

  // Thickness → font-weight (only 500/700 are actually loaded for this font, so
  // "bold" is reinforced with an SVG stroke around the glyphs — this is what makes
  // the watermark visibly thicker/thinner in both screen and print reliably).
  const thicknessMap = {
    thin:   {weight:500, stroke:0.05},
    normal: {weight:700, stroke:0.30},
    bold:   {weight:700, stroke:0.85}
  };
  const tk = thicknessMap[thickness] || thicknessMap.normal;
  const strokeAttr = tk.stroke>0 ? `stroke="${color}" stroke-width="${tk.stroke}"` : '';

  // Density → how tightly the pattern repeats/how many rings or turns it has.
  // 1 = बहुत विरल (sparse), 5 = बहुत घना (dense).
  // density is now 1–10 (doubled range/resolution). t=0 → sparsest, t=1 → densest —
  // and the densest end is calibrated roughly 2x tighter than the old 1–5 scale.
  const dt = (density-1)/9;
  const spacingMult = 1.6 - dt*1.3;   // 1→1.6 (wide gaps), 10→0.3 (very tight/dense)
  const ringCount = 4 + Math.round(dt*14); // 1→4 rings, 10→18 rings
  const spiralTurns = 2 + dt*10;       // 1→2, 10→12 turns

  const W = 210, H = 297, cx = W/2, cy = H/2;
  const cornerR = Math.sqrt(cx*cx + cy*cy); // ≈182mm
  const FONT = "'Noto Serif Devanagari',serif";

  function ringsStyle(){
    let defs = '', texts = '';
    for(let i=0;i<ringCount;i++){
      const t = i/(ringCount-1);
      const r = 14 + t*(cornerR-14);
      const size = (6 + t*11)*sizeMult;
      const op = baseOpacity * (1 - t*0.45);
      const id = `${idp}r${i}`;
      defs += `<path id="${id}" d="M ${cx-r},${cy} a ${r},${r} 0 1,1 ${r*2},0 a ${r},${r} 0 1,1 -${r*2},0" fill="none"/>`;
      const circumference = 2*Math.PI*r;
      const approxCharWidth = size*0.6;
      const unit = name + '   •   ';
      const oneRepeatLen = unit.length * approxCharWidth;
      const repeats = Math.max(2, Math.round(circumference / oneRepeatLen));
      const repeatedText = Array(repeats).fill(name).join('   •   ') + '   •   ';
      texts += `<text style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:1px;" fill="${color}" fill-opacity="${op.toFixed(3)}" ${strokeAttr} stroke-opacity="${(op*0.9).toFixed(3)}">
        <textPath href="#${id}" startOffset="0">${repeatedText}</textPath>
      </text>`;
    }
    return `<defs>${defs}</defs>${texts}`;
  }

  function spiralStyle(){
    const maxTheta = spiralTurns * 2 * Math.PI;
    const a = 6;
    const b = (cornerR - a) / maxTheta;
    const pts = [];
    const steps = 260;
    for(let i=0;i<=steps;i++){
      const theta = (i/steps) * maxTheta;
      const r = a + b*theta;
      pts.push(`${(cx + r*Math.cos(theta)).toFixed(2)},${(cy + r*Math.sin(theta)).toFixed(2)}`);
    }
    const id = `${idp}spiral`;
    const pathD = 'M ' + pts.join(' L ');
    const segCount = 4 + density; // denser = more growing text segments along the spiral
    let texts = '';
    for(let i=0;i<segCount;i++){
      const t = i/(segCount-1);
      const offsetPct = (2 + t*88).toFixed(1) + '%';
      const size = (6 + t*8)*sizeMult;
      const op = baseOpacity * (1 - i*(0.5/segCount));
      texts += `<text style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:1px;" fill="${color}" fill-opacity="${Math.max(op,0.03).toFixed(3)}" ${strokeAttr} stroke-opacity="${Math.max(op*0.9,0.03).toFixed(3)}">
        <textPath href="#${id}" startOffset="${offsetPct}">${(name+'   •   ').repeat(6)}</textPath>
      </text>`;
    }
    return `<defs><path id="${id}" d="${pathD}" fill="none"/></defs>${texts}`;
  }

  function singleStyle(){
    const size = 22*sizeMult;
    return `<g transform="rotate(-32 ${cx} ${cy})">
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
        style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:2px;"
        fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${name}</text>
    </g>`;
  }

  function diagonalStyle(){
    const stepX = 60*spacingMult, stepY = 50*spacingMult, size = 9*sizeMult;
    let texts = '';
    for(let y=-stepY; y<=H+stepY; y+=stepY){
      for(let x=-stepX; x<=W+stepX; x+=stepX){
        texts += `<text x="${x}" y="${y}" transform="rotate(-30 ${x} ${y})" text-anchor="middle"
          style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:.5px;"
          fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${name}</text>`;
      }
    }
    return texts;
  }

  function gridStyle(){
    const stepX = 55*spacingMult, stepY = 40*spacingMult, size = 8.5*sizeMult;
    let texts = '';
    for(let y=stepY/2; y<=H; y+=stepY){
      for(let x=stepX/2; x<=W; x+=stepX){
        texts += `<text x="${x}" y="${y}" text-anchor="middle"
          style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:.5px;"
          fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${name}</text>`;
      }
    }
    return texts;
  }

  // सीधी क्षैतिज पंक्तियाँ — no rotation, one continuous repeated line of text
  // across the full width of the page, stacked in rows top to bottom.
  function horizontalStyle(){
    const stepY = 34*spacingMult, size = 9.5*sizeMult;
    const approxCharWidth = size*0.6;
    const unit = name + '   •   ';
    const repeats = Math.max(3, Math.ceil((W+2*unit.length*approxCharWidth) / (unit.length*approxCharWidth)));
    const line = Array(repeats).fill(name).join('   •   ') + '   •   ';
    let texts = '';
    for(let y=stepY/2; y<=H; y+=stepY){
      texts += `<text x="${-unit.length*approxCharWidth}" y="${y}"
        style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:.5px;"
        fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${line}</text>`;
    }
    return texts;
  }

  // सीधी ऊर्ध्वाधर पट्टियाँ — same idea rotated 90°, running top-to-bottom in columns.
  function verticalStyle(){
    const stepX = 34*spacingMult, size = 9.5*sizeMult;
    const approxCharWidth = size*0.6;
    const unit = name + '   •   ';
    const repeats = Math.max(3, Math.ceil((H+2*unit.length*approxCharWidth) / (unit.length*approxCharWidth)));
    const line = Array(repeats).fill(name).join('   •   ') + '   •   ';
    let texts = '';
    for(let x=stepX/2; x<=W; x+=stepX){
      texts += `<text x="${x}" y="${-unit.length*approxCharWidth}" transform="rotate(90 ${x} 0)"
        style="font-size:${size}px;font-family:${FONT};font-weight:${tk.weight};letter-spacing:.5px;"
        fill="${color}" fill-opacity="${baseOpacity}" ${strokeAttr} stroke-opacity="${baseOpacity*0.9}">${line}</text>`;
    }
    return texts;
  }

  let inner;
  switch(style){
    case 'spiral': inner = spiralStyle(); break;
    case 'single': inner = singleStyle(); break;
    case 'diagonal': inner = diagonalStyle(); break;
    case 'grid': inner = gridStyle(); break;
    case 'horizontal': inner = horizontalStyle(); break;
    case 'vertical': inner = verticalStyle(); break;
    case 'rings':
    default: inner = ringsStyle(); break;
  }

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

function renderAdmitCardPrintView(view){
  const {cls, exam, ids} = view;
  const students = ((db.classes[cls]||{}).students||[]).filter(s=> ids.includes(s.id));
  const subjects = subjectsForClass(cls);
  const sched = ((db.examSchedule[exam]||{})[cls]) || {};
  const schoolName = (db.school && db.school.name) ? db.school.name : 'हमारा विद्यालय';
  const schoolAddr = (db.school && db.school.address) ? db.school.address : '';

  const wrap = el(`<div id="admitPrintWrap"></div>`);
  const bar = el(`<div class="admit-card-toolbar no-print">
    <button class="ghost" id="acBack">← वापस</button>
    <button class="primary" id="acDoPrint">प्रिंट करें</button>
    <span style="color:var(--muted);font-size:.85rem;">कुल ${students.length} प्रवेश पत्र तैयार</span>
  </div>`);
  bar.querySelector('#acBack').onclick = ()=>{ ui.admitPrintView=null; render(); };
  bar.querySelector('#acDoPrint').onclick = ()=> window.print();
  wrap.appendChild(bar);

  const sortedSubjects = subjects.slice().sort((a,b)=>{
    const da = (sched[a.subject]||{}).date || '9999-99-99';
    const db_ = (sched[b.subject]||{}).date || '9999-99-99';
    return da.localeCompare(db_);
  });

  const wmSettings = db.watermark || {enabled:true, style:'rings', color:'#2F5D50', opacity:0.14, text:''};
  const wmEnabled = false;
  const allInstructions = [
    'यह प्रवेश पत्र प्रत्येक परीक्षा में साथ लाना अनिवार्य है।',
    'परीक्षा शुरू होने से 30 मिनट पहले परीक्षा कक्ष में उपस्थित हों।',
    'मोबाइल फोन व अन्य इलेक्ट्रॉनिक उपकरण परीक्षा कक्ष में वर्जित हैं।',
    'प्रवेश पत्र खो जाने पर तुरंत कक्षा अध्यापक/कार्यालय को सूचित करें।',
    ...(db.customInstructions || [])
  ];

  students.forEach(s=>{
    const bgStyle = db.admitBgImage ? ` style="background-image:url('${db.admitBgImage}');background-size:cover;background-position:center;background-repeat:no-repeat;"` : '';
    const card = el(`<div class="admit-card"${bgStyle}></div>`);
    if(wmEnabled){
      const watermarkSVG = buildWatermarkSVG(schoolName, wmSettings, s.id);
      card.appendChild(el(`<div class="ac-watermark">${watermarkSVG}</div>`));
    }
    card.appendChild(el(`<div class="ac-header">
      <div class="ac-school-name">${schoolName}</div>
      ${schoolAddr?`<div class="ac-school-addr">${schoolAddr}</div>`:''}
      <div class="ac-admit-title">प्रवेश पत्र · ADMIT CARD</div>
      <div class="ac-exam-sub">${exam}</div>
    </div>`));
    card.appendChild(el(`<div class="ac-main">
      <div class="ac-photo">${s.photo ? `<img src="${s.photo}">` : 'विद्यार्थी<br>फोटो'}</div>
      <div class="ac-details">
        <div class="sd-cell"><span class="sd-label">छात्र का नाम</span><span class="sd-value">${s.name}</span></div>
        <div class="sd-cell"><span class="sd-label">पिता का नाम</span><span class="sd-value">${s.father || s.guardian || '—'}</span></div>
        <div class="sd-cell"><span class="sd-label">जन्म तिथि</span><span class="sd-value">${s.dob ? formatDateDMY(s.dob) : '—'}</span></div>
        <div class="sd-cell"><span class="sd-label">माता का नाम</span><span class="sd-value">${s.mother || '—'}</span></div>
        <div class="sd-cell"><span class="sd-label">कक्षा</span><span class="sd-value">${cls}</span></div>
        <div class="sd-cell"><span class="sd-label">रोल नंबर</span><span class="sd-value">${s.roll}</span></div>
      </div>
    </div>`));
    const schedRows = sortedSubjects.map((sub,i)=>{
      const e = sched[sub.subject] || {};
      return `<tr><td class="mono">${i+1}</td><td>${sub.subject}</td><td>${formatDateDMY(e.date)}</td><td>${hindiDay(e.date)}</td><td>${formatTime12(e.time)}</td></tr>`;
    }).join('') || `<tr><td colspan="5" style="text-align:center;color:var(--muted);">परीक्षा तालिका अभी नहीं भरी गई</td></tr>`;
    card.appendChild(el(`<div class="ac-sched">
      <h4>परीक्षा तालिका (Exam Schedule)</h4>
      <table><thead><tr><th>क्रम</th><th>विषय</th><th>दिनांक</th><th>दिन</th><th>समय</th></tr></thead>
      <tbody>${schedRows}</tbody></table>
    </div>`));
    card.appendChild(el(`<div class="ac-instructions">
      <h5>परीक्षार्थियों के लिए निर्देश</h5>
      <ul>${allInstructions.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>`));
    card.appendChild(el(`<div class="ac-signatures">
      <div class="ac-sig"><div class="line">प्राचार्य</div></div>
    </div>`));
    wrap.appendChild(card);
  });
  return wrap;
}

// ---------- TEACHER ----------
function renderTeacherTab(){
  const u = session.username;
  const assigns = db.assignments[u] || [];

  if(ui.teacherTab){
    const a = ui.teacherTab;
    const cls = a.cls, subject = a.subject, components = a.components;
    if(!ui.examTab) ui.examTab = db.exams[0];
    const exam = ui.examTab;

    const wrap = el(`<div class="page"><div class="punch"></div>
      <button class="ghost no-print" id="backBtn" style="margin-bottom:16px;">← वापस मेरी कक्षाओं में</button>
      <h2 class="section-title">${cls} — ${subject}</h2>
      <p class="section-sub">परीक्षा चुनें, फिर हर छात्र के अंक भरकर सेव करें</p>
      <div class="exam-tabbar no-print" id="examTabbar"></div>
      <div class="note" id="fillSummary" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;"></div>
      <table><thead><tr><th>रोल नं.</th><th>नाम</th>
        ${components.map(c=>`<th class="num">${c.name===MAIN_KEY?'अंक':c.name} (${compMax(c, exam)})</th>`).join('')}
        ${components.length>1?'<th class="num">कुल</th>':''}
        <th class="num">स्थिति</th>
      </tr></thead><tbody id="markRows"></tbody></table>
      <button class="primary" id="saveMarks" style="margin-top:14px;">अंक सेव करें</button>
      <span id="savedMsg" style="margin-left:10px;color:var(--chalk);font-size:.85rem;"></span>
      <div id="markErr" style="color:var(--redpen);font-size:.85rem;margin-top:8px;"></div>
    </div>`);

    wrap.querySelector('#backBtn').onclick = ()=>{ ui.teacherTab=null; ui.examTab=null; render(); };

    const examTabbar = wrap.querySelector('#examTabbar');
    db.exams.forEach(ex=>{
      const b = el(`<button class="${ex===exam?'active':''}">${ex}</button>`);
      b.onclick = ()=>{ ui.examTab = ex; render(); };
      examTabbar.appendChild(b);
    });

    const students = (db.classes[cls]||{}).students || [];
    const rows = wrap.querySelector('#markRows');
    if(students.length===0){
      rows.appendChild(el(`<tr><td colspan="${3+components.length+(components.length>1?1:0)}" style="text-align:center;color:var(--muted);">इस कक्षा में कोई छात्र नहीं है</td></tr>`));
    }
    const summaryBox = wrap.querySelector('#fillSummary');
    function updateSummary(){
      if(students.length===0){ summaryBox.style.display='none'; return; }
      summaryBox.style.display='flex';
      const rowEls = Array.from(rows.querySelectorAll('tr[data-status]'));
      const done = rowEls.filter(r=>r.dataset.status==='done').length;
      const partial = rowEls.filter(r=>r.dataset.status==='partial').length;
      const pending = rowEls.filter(r=>r.dataset.status==='pending').length;
      summaryBox.innerHTML = `<b style="color:var(--chalk);">${done}/${students.length}</b> छात्रों के अंक पूरे भरे`
        + (partial? ` · <b style="color:var(--marigold);">${partial}</b> आंशिक` : '')
        + (pending? ` · <b style="color:var(--redpen);">${pending}</b> बाकी` : '');
    }
    students.forEach(s=>{
      const tr = el(`<tr></tr>`);
      tr.appendChild(el(`<td class="mono">${s.roll}</td>`));
      tr.appendChild(el(`<td>${s.name}</td>`));
      const inputs = [];
      components.forEach(c=>{
        const existing = componentValue(exam, cls, subject, c.name, s.id);
        const td = el(`<td class="num"><input type="number" min="0" max="${compMax(c, exam)}" style="width:80px;text-align:center;" data-comp="${c.name}" data-sid="${s.id}" value="${existing ?? ''}"></td>`);
        inputs.push(td.querySelector('input'));
        tr.appendChild(td);
      });
      let totalCell = null;
      if(components.length>1){
        totalCell = el(`<td class="num mono" data-total-for="${s.id}">—</td>`);
        tr.appendChild(totalCell);
      }
      const statusCell = el(`<td class="num"><span class="type-tag" data-status-badge></span></td>`);
      tr.appendChild(statusCell);
      const badge = statusCell.querySelector('[data-status-badge]');
      function recomputeTotal(){
        let sum=0, any=false;
        inputs.forEach(inp=>{ if(inp.value!==''){ sum+=parseFloat(inp.value)||0; any=true; } });
        if(totalCell) totalCell.textContent = any ? sum : '—';
      }
      function refreshStatus(){
        const filled = inputs.filter(inp=>inp.value.trim()!=='').length;
        let status, label, bg, color;
        if(filled===0){ status='pending'; label='बाकी'; bg='rgba(178,58,50,.12)'; color='var(--redpen)'; }
        else if(filled===inputs.length){ status='done'; label='भरा ✓'; bg='rgba(47,93,80,.14)'; color='var(--chalk)'; }
        else { status='partial'; label='आंशिक'; bg='rgba(217,143,43,.16)'; color='var(--marigold)'; }
        tr.dataset.status = status;
        badge.textContent = label;
        badge.style.background = bg;
        badge.style.color = color;
        updateSummary();
      }
      function validateInput(inp){
        const compMax = parseFloat(inp.max);
        const v = inp.value.trim();
        let bad = false;
        if(v!==''){
          const num = parseFloat(v);
          if(isNaN(num) || num>compMax || num<0) bad = true;
        }
        inp.classList.toggle('mark-invalid', bad);
        return !bad;
      }
      inputs.forEach(inp=> inp.addEventListener('input', ()=>{ recomputeTotal(); validateInput(inp); refreshStatus(); }));
      inputs.forEach(inp=> validateInput(inp));
      recomputeTotal();
      refreshStatus();
      rows.appendChild(tr);
    });
    updateSummary();

    wrap.querySelector('#saveMarks').onclick = async ()=>{
      const errBox = wrap.querySelector('#markErr');
      errBox.textContent = '';
      const allInputs = Array.from(rows.querySelectorAll('input[data-comp]'));
      let firstBad = null;
      const badList = [];
      allInputs.forEach(inp=>{
        const comp = inp.dataset.comp, sid = inp.dataset.sid;
        const thisMax = compMax(components.find(c=>c.name===comp), exam);
        const v = inp.value.trim();
        let bad = false;
        if(v!==''){
          const num = parseFloat(v);
          if(isNaN(num) || num>thisMax || num<0) bad = true;
        }
        inp.classList.toggle('mark-invalid', bad);
        if(bad){
          if(!firstBad) firstBad = inp;
          const tr = inp.closest('tr');
          const rollTd = tr ? tr.querySelector('td.mono') : null;
          badList.push(`रोल ${rollTd?rollTd.textContent:'?'} — ${comp==='मुख्य'?'अंक':comp} (अधिकतम ${compMax})`);
        }
      });
      if(firstBad){
        errBox.textContent = 'ये अंक अधिकतम सीमा से ज़्यादा हैं, कृपया ठीक करें: ' + badList.join('; ');
        firstBad.focus();
        firstBad.scrollIntoView({behavior:'smooth', block:'center'});
        return;
      }
      db.marks[exam] = db.marks[exam] || {};
      db.marks[exam][cls] = db.marks[exam][cls] || {};
      db.marks[exam][cls][subject] = db.marks[exam][cls][subject] || {};
      components.forEach(c=>{
        db.marks[exam][cls][subject][c.name] = db.marks[exam][cls][subject][c.name] || {};
      });
      allInputs.forEach(inp=>{
        const comp = inp.dataset.comp, sid = inp.dataset.sid;
        const v = inp.value.trim();
        if(v===''){ delete db.marks[exam][cls][subject][comp][sid]; }
        else {
          db.marks[exam][cls][subject][comp][sid] = parseFloat(v);
        }
      });
      await saveDB();
      wrap.querySelector('#savedMsg').textContent = 'सेव हो गया ✓';
      setTimeout(()=>{ const m=wrap.querySelector('#savedMsg'); if(m) m.textContent=''; }, 2000);
    };
    return wrap;
  }

  const wrap = el(`<div class="page"><div class="punch"></div>
    <h2 class="section-title">मेरी कक्षाएँ व विषय</h2>
    <p class="section-sub">जिस कक्षा/विषय पर क्लिक करेंगे, वहाँ परीक्षा चुनकर अंक भर सकते हैं</p>
    <div class="card-grid" id="assignGrid"></div></div>`);
  const grid = wrap.querySelector('#assignGrid');
  if(assigns.length===0){
    grid.appendChild(el(`<div class="empty">आपको अभी कोई कक्षा/विषय असाइन नहीं हुआ है। एडमिन से संपर्क करें।</div>`));
  }
  assigns.forEach(a=>{
    const students = ((db.classes[a.cls]||{}).students||[]);
    const studentCount = students.length;
    const typeLabel = a.components.length===1 ? '' : (a.components[0].name.includes('Practical')||a.components[1] && a.components[1].name.includes('Practical') ? '<span class="type-tag">Theory+Practical</span>' : '<span class="type-tag">दो प्रश्नपत्र</span>');
    const examStatusLine = studentCount>0 ? db.exams.map(ex=>{
      const done = students.filter(s=> subjectResult(ex, a.cls, a.subject, a.components, s.id).any
        && a.components.every(c=>{ const v=componentValue(ex,a.cls,a.subject,c.name,s.id); return v!==undefined && v!==null && v!==''; })
      ).length;
      const color = done===0 ? 'var(--redpen)' : (done===studentCount ? 'var(--chalk)' : 'var(--marigold)');
      return `<span style="color:${color};">${ex}: ${done}/${studentCount}</span>`;
    }).join(' · ') : '';
    const card = el(`<div class="assign-card">
      <div class="cls">कक्षा ${a.cls}</div>
      <div class="sub">${a.subject} ${typeLabel}</div>
      <div class="meta">${studentCount} छात्र · घटक: ${a.components.map(c=>c.name===MAIN_KEY?'—':c.name).filter(Boolean).join(', ')||'सामान्य'}</div>
      ${examStatusLine? `<div class="meta" style="margin-top:6px;font-weight:600;">${examStatusLine}</div>` : ''}
    </div>`);
    card.onclick = ()=>{ ui.teacherTab = a; ui.examTab = null; render(); };
    grid.appendChild(card);
  });
  return wrap;
}

// ---------- INIT ----------
(async function init(){
  render(); // show the UI (login screen) immediately, no blank/loading wait
  try{ await firebase.auth().signInAnonymously(); }
  catch(e){ console.error('firebase anonymous sign-in failed', e); }
  authReadyResolve();
  await loadRegistry();
  await loadTeacherIndex();
  // school/teacher/superadmin login handlers each fetch fresh registry/teacherIndex
  // on submit, so we don't need to re-render here.
})();
